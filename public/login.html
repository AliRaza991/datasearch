<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DataSearch — Login</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:#0A0E1A; color:#eaf0fb;
  font-family:'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.card{
  background:#1A2035; border:1px solid rgba(255,255,255,.07);
  border-radius:18px; padding:40px 36px; width:min(420px, 92vw);
  box-shadow:0 24px 60px -28px rgba(0,0,0,.9);
}
.logo{
  display:flex; align-items:center; gap:10px; margin-bottom:32px; justify-content:center;
}
.logo-mark{
  width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
  background:linear-gradient(150deg, rgba(0,212,255,.22), rgba(255,215,0,.12));
  border:1px solid rgba(0,212,255,.4);
  box-shadow:0 0 22px rgba(0,212,255,.25);
  font-size:18px;
}
.logo-name{ font-size:14px; letter-spacing:.32em; text-transform:uppercase; }
.logo-name b{ color:#00D4FF; }
h1{ font-size:22px; font-weight:600; margin-bottom:8px; text-align:center; }
.sub{ color:#aab4cc; font-size:13px; text-align:center; margin-bottom:28px; }
label{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#6b7693; margin-bottom:6px; }
input{
  width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:12px 14px; color:#eaf0fb; font-family:inherit; font-size:14px;
  outline:none; transition:.2s; margin-bottom:18px;
}
input:focus{ border-color:rgba(0,212,255,.5); box-shadow:0 0 0 3px rgba(0,212,255,.1); }
button{
  width:100%; padding:14px; border:0; border-radius:12px; cursor:pointer;
  background:linear-gradient(135deg, #00D4FF, #6fe6ff); color:#04121a;
  font-family:inherit; font-weight:500; font-size:14px; letter-spacing:.06em;
  box-shadow:0 8px 26px -8px rgba(0,212,255,.7);
  transition:transform .18s, filter .18s;
}
button:hover{ transform:translateY(-1px); filter:brightness(1.06); }
button:disabled{ opacity:.55; cursor:wait; }
.err{ color:#ff9a8a; font-size:12.5px; text-align:center; margin-top:14px; min-height:18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">◎</div>
    <div class="logo-name">Data<b>Search</b></div>
  </div>
  <h1>Sign in</h1>
  <p class="sub">Enter your credentials to continue</p>
  <form id="loginForm" onsubmit="return false;">
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username" required />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" required />
    <button id="loginBtn" type="button" onclick="doLogin()">Sign in</button>
    <div class="err" id="errMsg"></div>
  </form>
</div>
<script>
  if (localStorage.getItem('ds_token')) window.location.replace('/');

  function showError(msg){
    const errMsg = document.getElementById('errMsg');
    errMsg.textContent = msg;
  }

  function showDeviceCodeForm(username, password){
    const container = document.querySelector('.card');
    const existing = document.getElementById('deviceCodeSection');
    if(existing) existing.remove();

    const div = document.createElement('div');
    div.id = 'deviceCodeSection';
    div.style.cssText = 'margin-top:16px;padding:16px;background:rgba(251,191,36,0.1);border:1.5px solid #FBBF24;border-radius:12px;';
    div.innerHTML = `
      <div style="font-size:0.78rem;font-weight:700;color:#FBBF24;margin-bottom:8px;">🔐 First Time Device Registration</div>
      <div style="font-size:0.7rem;color:#aab4cc;margin-bottom:12px;">Enter the device code provided by your admin to register this device.</div>
      <input id="deviceCodeInput" type="text" placeholder="XXXX-XXXX" maxlength="9"
        style="width:100%;padding:10px 14px;border:1.5px solid #FBBF24;border-radius:8px;font-size:1rem;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;outline:none;background:rgba(251,191,36,0.06);color:#eaf0fb;text-align:center;margin-bottom:10px;">
      <button onclick="submitDeviceCode('${username}','${password}')"
        style="width:100%;padding:10px;background:linear-gradient(135deg,#2563EB,#DC2626);color:#fff;border:none;border-radius:8px;font-size:0.82rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;">
        Register This Device
      </button>
    `;
    container.appendChild(div);

    const input = document.getElementById('deviceCodeInput');
    input.focus();
    input.addEventListener('input', function(){
      let val = this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
      if(val.length > 4) val = val.slice(0,4) + '-' + val.slice(4,8);
      this.value = val;
    });
  }

  async function submitDeviceCode(username, password){
    const deviceCode = document.getElementById('deviceCodeInput').value.trim();
    if(!deviceCode || deviceCode.length < 9){
      showError('Please enter complete device code (XXXX-XXXX)');
      return;
    }
    try{
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, deviceCode })
      });
      const data = await res.json();
      if(!res.ok){
        showError(data.message || 'Invalid device code');
        return;
      }
      if(data.deviceToken){
        localStorage.setItem('ds_device_token', data.deviceToken);
      }
      localStorage.setItem('ds_token', data.token);
      localStorage.setItem('ds_user', JSON.stringify(data.user || {}));
      window.location.href = '/';
    }catch(e){
      showError('Connection error. Please try again.');
    }
  }

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errMsg');
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    btn.disabled = true;
    errMsg.textContent = '';
    try {
      const deviceToken = localStorage.getItem('ds_device_token');
      const body = { username, password };
      if(deviceToken) body.deviceToken = deviceToken;

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      if(!response.ok){
        if(data.error === 'DEVICE_NOT_AUTHORIZED'){
          showError('This device is not authorized. Use your registered device.');
          btn.disabled = false; return;
        }
        if(data.error === 'DEVICE_CODE_REQUIRED'){
          btn.disabled = false;
          showDeviceCodeForm(username, password);
          return;
        }
        if(data.error === 'INVALID_DEVICE_CODE'){
          showError('Invalid device code. Please contact admin.');
          btn.disabled = false; return;
        }
        showError(data.error || data.message || 'Invalid credentials.');
        btn.disabled = false; return;
      }
      if(data.deviceToken){
        localStorage.setItem('ds_device_token', data.deviceToken);
      }
      localStorage.removeItem('ds_token');
      localStorage.removeItem('ds_user');
      localStorage.setItem('ds_token', data.token);
      localStorage.setItem('ds_user', JSON.stringify(data.user || {}));
      window.location.href = '/';
    } catch (err) {
      errMsg.textContent = 'Could not reach server. Try again.';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
