<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied — Massive Dynamics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#040d1a;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 40%,rgba(37,99,235,0.25) 0%,transparent 60%),radial-gradient(ellipse 50% 45% at 85% 35%,rgba(220,38,38,0.2) 0%,transparent 60%);pointer-events:none;}
.card{position:relative;z-index:1;text-align:center;padding:48px 40px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;backdrop-filter:blur(20px);max-width:420px;width:90%;}
.icon{font-size:4rem;margin-bottom:20px;}
.title{font-family:'Manrope',sans-serif;font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:10px;}
.sub{font-size:0.82rem;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:28px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#2563EB,#DC2626);color:#fff;border:none;border-radius:12px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.4);}
.brand{margin-top:24px;font-size:0.7rem;color:rgba(255,255,255,0.2);}
.brand span{color:#2563EB;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <div class="title">Access Denied</div>
  <div class="sub">You do not have permission to access this page. Please contact your administrator.</div>
  <a href="/login.html" class="btn" onclick="localStorage.removeItem('ds_token');localStorage.removeItem('ds_user');">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    Back to Login
  </a>
  <div class="brand"><span>Massive</span> Dynamics CRM</div>
</div>
</body>
</html>
