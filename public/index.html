<!DOCTYPE html>
<html lang="en">
<head>
<style>html{visibility:hidden}</style>
<script>
  if(localStorage.getItem('ds_token')) {
    document.documentElement.style.visibility = 'visible';
  }
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DataSearch — Record Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/lucide@0.471.0/dist/umd/lucide.min.js"></script>
<style>
/* ============================================================
   DataSearch — luxury dark record lookup
   Palette: #0A0E1A bg · #00D4FF cyan · #FFD700 gold · #1A2035 card
   Type:    Playfair Display (headings) · DM Mono (data)
   ============================================================ */
@property --bd-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

:root{
  --bg:#0A0E1A;
  --bg-2:#0c1120;
  --card:#1A2035;
  --card-2:#151b2e;
  --line:rgba(255,255,255,.07);
  --line-strong:rgba(255,255,255,.12);
  --cyan:#00D4FF;
  --gold:#FFD700;
  --ink:#eaf0fb;
  --ink-2:#aab4cc;
  --ink-3:#6b7693;
  --mono:'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --serif:'Playfair Display', Georgia, serif;
  --r:18px;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--mono);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
/* ambient glow + faint terminal grid */
body::before{
  content:''; position:fixed; inset:-15%; z-index:0; pointer-events:none;
  background:
    radial-gradient(900px 520px at 50% -8%, rgba(0,212,255,.12), transparent 60%),
    radial-gradient(700px 500px at 88% 8%, rgba(255,215,0,.06), transparent 55%),
    radial-gradient(820px 620px at 8% 30%, rgba(0,212,255,.05), transparent 60%),
    radial-gradient(700px 560px at 78% 82%, rgba(0,170,255,.05), transparent 60%);
  animation:aurora 22s ease-in-out infinite alternate;
}
@keyframes aurora{
  0%   { transform:translate3d(0,0,0) scale(1); }
  50%  { transform:translate3d(2.5%,-2%,0) scale(1.06); }
  100% { transform:translate3d(-2.5%,2.2%,0) scale(1.1); }
}
@media (prefers-reduced-motion:reduce){ body::before{ animation:none; } }
body::after{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  background-size:64px 64px;
  -webkit-mask-image:radial-gradient(circle at 50% 35%, #000, transparent 78%);
          mask-image:radial-gradient(circle at 50% 35%, #000, transparent 78%);
}
.stage{ position:relative; z-index:1; }

/* ---------------- HERO / HEADER ---------------- */
.hero{
  position:relative;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
  padding:48px 24px;
  transition:min-height .6s cubic-bezier(.22,1,.36,1), padding .6s cubic-bezier(.22,1,.36,1);
}
.brand{
  display:flex; align-items:center; gap:12px; margin-bottom:36px;
  transition:margin .5s ease, transform .5s ease;
}
.brand-mark{
  width:38px; height:38px; border-radius:11px; display:grid; place-items:center;
  background:linear-gradient(150deg, rgba(0,212,255,.22), rgba(255,215,0,.12));
  border:1px solid rgba(0,212,255,.4);
  box-shadow:0 0 22px rgba(0,212,255,.25), inset 0 0 14px rgba(0,212,255,.12);
}
.brand-mark svg{ width:20px; height:20px; color:var(--cyan); }
.brand-name{ font-family:var(--mono); font-weight:500; letter-spacing:.32em; text-transform:uppercase; font-size:14px; color:var(--ink); }
.brand-name b{ color:var(--cyan); font-weight:500; }

.tagline{
  font-family:var(--serif); font-weight:600; font-style:italic;
  font-size:clamp(34px, 6vw, 66px); line-height:1.04; margin:0 0 16px;
  letter-spacing:-.01em; color:var(--ink); max-width:14ch;
  text-wrap:balance;
}
.tagline em{ font-style:italic; color:transparent; background:linear-gradient(100deg,var(--cyan),#7be4ff 60%,var(--gold)); -webkit-background-clip:text; background-clip:text; }
.sub{
  font-family:var(--mono); font-weight:300; color:var(--ink-2);
  font-size:clamp(13px,1.5vw,15.5px); letter-spacing:.02em; margin:0 0 40px; max-width:52ch;
  line-height:1.6;
}

/* ---------------- SEARCH ---------------- */
.search-wrap{
  position:relative; width:min(720px, 100%); border-radius:var(--r);
  transition:width .5s ease;
}
.search-wrap::before{
  content:''; position:absolute; inset:0; border-radius:inherit; padding:1.5px;
  background:conic-gradient(from var(--bd-angle), rgba(0,212,255,.0), var(--cyan), var(--gold), rgba(0,212,255,.0));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  opacity:.35; transition:opacity .45s ease; pointer-events:none;
}
.search-wrap:focus-within::before{ opacity:1; animation:spin 4.5s linear infinite; }
@keyframes spin{ to{ --bd-angle:360deg; } }

.search{
  position:relative; display:flex; align-items:center; gap:10px;
  background:linear-gradient(180deg, rgba(26,32,53,.72), rgba(16,20,34,.82));
  -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px);
  border:1px solid var(--line-strong); border-radius:var(--r);
  padding:12px 12px 12px 22px;
  box-shadow:0 24px 60px -28px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.04);
}
.search .lead-ico{ color:var(--ink-3); width:22px; height:22px; flex:0 0 auto; transition:color .3s; }
.search:focus-within .lead-ico{ color:var(--cyan); }
.search input{
  flex:1 1 auto; min-width:0; background:transparent; border:0; outline:none;
  color:var(--ink); font-family:var(--mono); font-weight:400;
  font-size:clamp(15px,2vw,18px); letter-spacing:.01em; padding:14px 4px;
}
.search input::placeholder{ color:var(--ink-3); }
.type-badge{
  flex:0 0 auto; font-family:var(--mono); font-size:10.5px; font-weight:500;
  letter-spacing:.18em; text-transform:uppercase; padding:5px 10px; border-radius:999px;
  color:var(--ink-3); border:1px solid var(--line); background:rgba(255,255,255,.02);
  opacity:0; transform:translateY(2px); transition:.3s; white-space:nowrap;
}
.type-badge.show{ opacity:1; transform:none; }
.type-badge.email{ color:var(--cyan); border-color:rgba(0,212,255,.4); background:rgba(0,212,255,.08); }
.type-badge.phone{ color:var(--gold); border-color:rgba(255,215,0,.4); background:rgba(255,215,0,.08); }

.search-btn{
  flex:0 0 auto; display:inline-flex; align-items:center; gap:9px; cursor:pointer;
  font-family:var(--mono); font-weight:500; letter-spacing:.06em; font-size:14px;
  color:#04121a; background:linear-gradient(135deg, var(--cyan), #6fe6ff);
  border:0; border-radius:13px; padding:14px 22px;
  box-shadow:0 8px 26px -8px rgba(0,212,255,.7);
  animation:pulse 2.8s ease-out infinite;
  transition:transform .18s ease, filter .18s ease;
}
.search-btn svg{ width:18px; height:18px; }
.search-btn .lbl{ }
.search-btn:hover{ transform:translateY(-1px); filter:brightness(1.06); }
.search-btn:active{ transform:translateY(0) scale(.98); }
.search-btn:disabled{ opacity:.55; cursor:wait; animation:none; }
@keyframes pulse{
  0%,100%{ box-shadow:0 8px 26px -8px rgba(0,212,255,.6), 0 0 0 0 rgba(0,212,255,.45); }
  55%    { box-shadow:0 8px 26px -8px rgba(0,212,255,.6), 0 0 0 9px rgba(0,212,255,0); }
}

.examples{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:22px; }
.examples .lab{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); align-self:center; margin-right:2px; }
.chip{
  font-family:var(--mono); font-size:12.5px; color:var(--ink-2); cursor:pointer;
  background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:999px;
  padding:7px 14px; transition:.2s; white-space:nowrap;
}
.chip:hover{ color:var(--ink); border-color:rgba(0,212,255,.45); background:rgba(0,212,255,.06); }

.field-hint{ font-size:11.5px; color:var(--ink-3); margin-top:14px; min-height:16px; letter-spacing:.02em; }
.field-hint.err{ color:#ff9a8a; }

/* New Search (hidden until results) */
.newsearch{
  display:none; align-items:center; gap:8px; cursor:pointer;
  font-family:var(--mono); font-size:13px; letter-spacing:.04em; color:var(--ink);
  background:rgba(255,255,255,.04); border:1px solid var(--line-strong); border-radius:11px;
  padding:11px 16px; transition:.2s;
}
.newsearch svg{ width:16px; height:16px; color:var(--cyan); }
.newsearch:hover{ border-color:rgba(0,212,255,.45); background:rgba(0,212,255,.06); }

/* ---------------- RESULTS-MODE LAYOUT ---------------- */
body.results-mode .hero{
  min-height:auto; padding:18px 24px; position:sticky; top:0; z-index:50;
  flex-direction:row; align-items:center; justify-content:space-between; gap:18px;
  background:linear-gradient(180deg, rgba(10,14,26,.92), rgba(10,14,26,.72));
  -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
body.results-mode .brand{ margin:0; }
body.results-mode .tagline,
body.results-mode .sub,
body.results-mode .examples,
body.results-mode .field-hint{ display:none; }
body.results-mode .search-wrap{ width:min(440px, 46vw); }
body.results-mode .search{ padding:7px 7px 7px 16px; }
body.results-mode .search input{ padding:9px 4px; font-size:14px; }
body.results-mode .search-btn{ padding:10px 14px; }
body.results-mode .search-btn .lbl{ display:none; }
body.results-mode .newsearch{ display:inline-flex; }

@media (max-width:720px){
  body.results-mode .hero{ flex-wrap:wrap; }
  body.results-mode .brand{ order:1; }
  body.results-mode .newsearch{ order:2; margin-left:auto; }
  body.results-mode .search-wrap{ order:3; width:100%; }
  body.results-mode .search-btn .lbl{ display:none; }
}

/* ---------------- RESULTS PANEL ---------------- */
main{ position:relative; z-index:1; }
.results{ width:100%; margin:0 auto; padding:14px 0 120px; opacity:1; animation:fadeUp .5s cubic-bezier(.22,1,.36,1); }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:none; } }
@media (max-width:720px){ .results{ padding:8px 0 100px; } }

.result-head{
  display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px;
  padding-bottom:24px; margin-bottom:8px; border-bottom:1px solid var(--line);
}
.rh-l{ min-width:0; }
.rh-kicker{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--cyan); margin-bottom:12px; }
.rh-name{ font-family:var(--serif); font-weight:600; font-size:clamp(30px,5vw,46px); line-height:1.04; margin:0 0 16px; letter-spacing:-.01em; }
.rh-contacts{ display:flex; flex-wrap:wrap; gap:8px 22px; }
.rh-contact{ display:inline-flex; align-items:center; gap:9px; font-size:14px; color:var(--ink-2); }
.rh-contact svg{ width:15px; height:15px; color:var(--ink-3); }
.rh-r{ display:flex; flex-direction:column; align-items:flex-end; gap:12px; }
.rh-count{ text-align:right; line-height:1; }
.rh-count b{ display:block; font-family:var(--mono); color:var(--gold); font-size:34px; font-weight:500; line-height:1; }
.rh-count span{ color:var(--ink-3); font-size:12px; letter-spacing:.12em; text-transform:uppercase; display:block; text-align:right; margin-top:9px; }
.rh-chips{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

/* status / plan chips */
.chip-tag{
  font-family:var(--mono); font-size:11.5px; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
  padding:6px 12px; border-radius:999px; border:1px solid var(--line-strong); color:var(--ink-2);
  background:rgba(255,255,255,.03);
}
.chip-tag.cyan{ color:var(--cyan); border-color:rgba(0,212,255,.4); background:rgba(0,212,255,.09); }
.chip-tag.gold{ color:var(--gold); border-color:rgba(255,215,0,.38); background:rgba(255,215,0,.08); }
.chip-tag.mute{ color:var(--ink-3); }

/* timeline */
.timeline{ position:relative; margin-top:34px; padding-left:26px; }
.timeline::before{ content:''; position:absolute; left:5px; top:8px; bottom:8px; width:1px; background:linear-gradient(180deg, var(--cyan), rgba(0,212,255,.15)); }
.tl-card{ position:relative; margin-bottom:18px; opacity:0; transform:translateY(18px); animation:rise .6s cubic-bezier(.22,1,.36,1) forwards; }
.tl-card::before{
  content:''; position:absolute; left:-25px; top:26px; width:11px; height:11px; border-radius:50%;
  background:var(--cyan); box-shadow:0 0 0 4px rgba(0,212,255,.12), 0 0 14px rgba(0,212,255,.6);
}
@keyframes rise{ to{ opacity:1; transform:none; } }

.card{
  background:linear-gradient(180deg, var(--card), var(--card-2));
  border:1px solid var(--line); border-radius:var(--r);
  padding:22px 24px; box-shadow:0 20px 50px -34px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.03);
}
.tl-top{ display:flex; align-items:baseline; justify-content:space-between; gap:14px 18px; margin-bottom:18px; flex-wrap:wrap; }
.tl-date{ flex:0 0 auto; font-family:var(--mono); color:var(--gold); font-size:13px; letter-spacing:.06em; display:inline-flex; align-items:center; gap:8px; }
.tl-date svg{ width:15px; height:15px; opacity:.8; }
.tl-title{ flex:1 1 auto; min-width:0; font-family:var(--serif); font-weight:600; font-size:21px; letter-spacing:-.005em; margin:0; }

.fields{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:13px; overflow:hidden; }
@media (max-width:560px){ .fields{ grid-template-columns:1fr; } }
.field{ background:var(--card); padding:14px 16px; display:flex; gap:12px; align-items:flex-start; min-width:0; }
.field.full{ grid-column:1 / -1; }
.f-ico{ flex:0 0 auto; width:30px; height:30px; border-radius:9px; display:grid; place-items:center; background:rgba(0,212,255,.07); border:1px solid rgba(0,212,255,.16); margin-top:1px; }
.f-ico svg{ width:15px; height:15px; color:var(--cyan); }
.f-body{ min-width:0; flex:1 1 auto; }
.f-label{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin-bottom:5px; }
.f-value{ font-family:var(--mono); font-size:14.5px; color:var(--ink); line-height:1.5; word-break:break-word; }
.f-value.gold{ color:var(--gold); }
.f-value.muted{ color:var(--ink-3); }

/* ---------------- SKELETON ---------------- */
.skeleton{ max-width:880px; margin:0 auto; padding:40px 24px; }
.sk{ background:linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.09) 37%, rgba(255,255,255,.04) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:8px; }
@keyframes shimmer{ to{ background-position:-400% 0; } }
.sk-name{ height:42px; width:46%; margin-bottom:18px; }
.sk-line{ height:14px; width:34%; margin-bottom:30px; }
.sk-card{ height:148px; width:100%; margin-bottom:18px; border-radius:var(--r); }
.sk-card:nth-child(3){ opacity:.7; } .sk-card:nth-child(4){ opacity:.45; }

/* ---------------- EMPTY / ERROR ---------------- */
.state{ max-width:560px; margin:0 auto; padding:90px 24px; text-align:center; }
.state-ico{ width:84px; height:84px; margin:0 auto 26px; border-radius:50%; display:grid; place-items:center; border:1px solid var(--line-strong); background:radial-gradient(circle at 50% 35%, rgba(0,212,255,.1), transparent 70%); }
.state-ico svg{ width:34px; height:34px; color:var(--cyan); opacity:.85; }
.state.error .state-ico{ background:radial-gradient(circle at 50% 35%, rgba(255,215,0,.12), transparent 70%); }
.state.error .state-ico svg{ color:var(--gold); }
.state h2{ font-family:var(--serif); font-weight:600; font-size:28px; margin:0 0 12px; }
.state p{ color:var(--ink-2); font-size:14px; line-height:1.65; margin:0 auto 8px; max-width:42ch; }
.state .q{ color:var(--ink); }

/* ---------------- DOWNLOAD BAR ---------------- */
.actions{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; justify-content:center; margin-top:38px; padding-top:30px; border-top:1px solid var(--line); }
.actions .a-lab{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); width:100%; text-align:center; margin-bottom:4px; }
.dl{ display:inline-flex; align-items:center; gap:10px; cursor:pointer; font-family:var(--mono); font-size:13.5px; letter-spacing:.04em; color:var(--ink); background:rgba(255,255,255,.04); border:1px solid var(--line-strong); border-radius:13px; padding:13px 22px; transition:.2s; }
.dl svg{ width:17px; height:17px; }
.dl.png{ color:var(--cyan); border-color:rgba(0,212,255,.35); }
.dl.png:hover{ background:rgba(0,212,255,.09); }
.dl.jpg{ color:var(--gold); border-color:rgba(255,215,0,.32); }
.dl.jpg:hover{ background:rgba(255,215,0,.08); }
.dl:disabled{ opacity:.5; cursor:wait; }

/* watermark injected only during capture */
.capture-watermark{ display:none; margin-top:22px; padding-top:18px; border-top:1px solid var(--line); align-items:center; justify-content:space-between; }
.capturing .capture-watermark{ display:flex; }
.capture-watermark .wm-l{ display:flex; align-items:center; gap:10px; }
.capture-watermark .wm-mark{ width:24px; height:24px; border-radius:7px; display:grid; place-items:center; background:linear-gradient(150deg, rgba(0,212,255,.22), rgba(255,215,0,.12)); border:1px solid rgba(0,212,255,.4); }
.capture-watermark .wm-mark svg{ width:13px; height:13px; color:var(--cyan); }
.capture-watermark .wm-name{ font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-2); }
.capture-watermark .wm-date{ font-size:11px; letter-spacing:.06em; color:var(--ink-3); }

/* ---------------- EXCEL-STYLE TABLE ---------------- */
.loading{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:130px 24px; }
.spinner{ width:48px; height:48px; border-radius:50%; border:3px solid rgba(0,212,255,.16); border-top-color:var(--cyan); animation:rot .8s linear infinite; box-shadow:0 0 26px rgba(0,212,255,.18); }
@keyframes rot{ to{ transform:rotate(360deg); } }
.loading p{ font-family:var(--mono); color:var(--ink-2); font-size:13px; letter-spacing:.05em; }

.table-bar{ max-width:1400px; width:95%; margin:0 auto; padding:44px 8px 0; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.th-count{ font-family:var(--mono); font-size:14.5px; color:var(--ink-2); letter-spacing:.01em; }
.th-count b{ color:var(--gold); font-weight:500; font-size:18px; }
.th-count .th-q{ color:var(--cyan); word-break:break-all; }
.dl-group{ display:flex; gap:10px; }

#captureArea{ max-width:1400px; width:95%; margin:22px auto 0; padding:0 8px 96px; }
.cap-title{ font-family:var(--serif); font-weight:600; font-style:italic; font-size:19px; color:var(--ink); margin-bottom:14px; display:flex; align-items:center; gap:11px; }
.cap-title .dot{ width:8px; height:8px; border-radius:50%; background:var(--cyan); box-shadow:0 0 11px var(--cyan); flex:0 0 auto; }

.sheet-wrap{
  overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 230px);
  border:1px solid var(--line-strong); border-radius:13px; background:var(--card-2);
  box-shadow:0 26px 64px -36px rgba(0,0,0,.95), inset 0 1px 0 rgba(255,255,255,.03);
  -webkit-overflow-scrolling:touch;
}
table.sheet{ border-collapse:collapse; width:100%; table-layout:auto; font-family:var(--mono); font-size:13px; color:var(--ink); }
table.sheet th, table.sheet td{
  border-right:1px solid var(--line); border-bottom:1px solid var(--line);
  padding:10px 16px; text-align:left; white-space:nowrap; min-width:110px; vertical-align:middle;
}
table.sheet td{ font-weight:400; }
/* frozen header */
table.sheet thead th{
  position:sticky; top:0; z-index:3;
  background:linear-gradient(180deg, #1d263c, #161d30);
  color:var(--cyan); font-weight:500; font-size:11px; letter-spacing:.13em; text-transform:uppercase;
  box-shadow:inset 0 -1px 0 var(--line-strong), 0 1px 0 rgba(0,0,0,.4);
}
/* zebra */
table.sheet tbody tr:nth-child(odd) td{ background:rgba(255,255,255,.018); }
table.sheet tbody tr:nth-child(even) td{ background:rgba(255,255,255,.045); }
table.sheet tbody tr:hover td{ background:rgba(0,212,255,.08); }
/* frozen row-number column */
table.sheet .rownum{
  position:sticky; left:0; z-index:2;
  width:54px; text-align:right; color:var(--ink-3);
  background:var(--bg-2);

/* =========================================================================
   CSV PARSING
   ========================================================================= */
function parseCSV(text){
  const rows=[]; let row=[]; let field=''; let i=0; let inQ=false;
  text = text.replace(/^\uFEFF/, '');
  while(i < text.length){
    const c = text[i];
    if(inQ){
      if(c === '"'){
        if(text[i+1] === '"'){ field+='"'; i+=2; continue; }
        inQ=false; i++; continue;
      }
      field+=c; i++; continue;
    } else {
      if(c === '"'){ inQ=true; i++; continue; }
      if(c === ','){ row.push(field); field=''; i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
      field+=c; i++; continue;
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length && r.some(c => c.trim() !== ''));
}

function toRecords(csvText){
  const rows = parseCSV(csvText);
  if(!rows.length) return { headers:[], records:[] };
  const rawHeaders = rows[0].map(h => h.trim());
  // drop columns with blank headers (trailing junk columns from the sheet)
  const keep = rawHeaders.map((h, i) => ({ h, i })).filter(o => o.h !== '');
  const headers = keep.map(o => o.h);
  const records = rows.slice(1).map(r => {
    const o = {};
    keep.forEach(({ h, i }) => o[h] = (r[i] ?? '').trim());
    return o;
  });
  return { headers, records };
}

/* =========================================================================
   COLUMN CLASSIFICATION + MATCHING
   ========================================================================= */
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function digitsOf(s){ return (s||'').replace(/\D/g,''); }

function classify(headers, records){
  const lc = h => h.toLowerCase();
  const sample = (h) => records.map(r => r[h]).filter(Boolean).slice(0,8);

  const emailCols=[], phoneCols=[]; let nameCol=null, dateCol=null;
  headers.forEach(h => {
    const n = lc(h);
    const vals = sample(h);
    const looksEmail = /e-?mail/.test(n) || (vals.length && vals.every(v => EMAIL_RE.test(v)));
    const looksPhone = /phone|mobile|cell|tel\b|contact number/.test(n) || (vals.length && vals.every(v => { const d=digitsOf(v); return d.length>=7 && d.length<=15 && /^[\d\s()+\-.]+$/.test(v); }));
    const looksDate  = /date|time|timestamp|created|joined/.test(n) || (vals.length && vals.every(v => !isNaN(Date.parse(v)) && /\d/.test(v)));
    const looksName  = /\bname\b|full name|customer|client|contact name|employee/.test(n);
    if(looksEmail) emailCols.push(h);
    else if(looksPhone) phoneCols.push(h);
    if(!nameCol && looksName) nameCol = h;
    if(!dateCol && looksDate) dateCol = h;
  });
  if(!nameCol){ nameCol = headers.find(h => /name/.test(lc(h))) || null; }
  return { emailCols, phoneCols, nameCol, dateCol };
}

function detectType(value){
  const v = (value||'').trim();
  if(!v) return null;
  if(v.includes('@')) return 'email';
  const d = digitsOf(v);
  if(d.length >= 7 && /^[\d\s()+\-.]+$/.test(v)) return 'phone';
  return null;
}

// A query is treated as a phone lookup only if it's made of phone characters
// (digits, spaces, +, -, (), .) with at least 4 digits — so text queries that
// merely contain stray digits don't match on digit-substrings.
function isPhoneQuery(query){
  const t = (query || '').trim();
  return /^[\d\s()+\-.]+$/.test(t) && digitsOf(t).length >= 4;
}

function matchHit(value, q, qDigits, phoneMode){
  // Cells may hold several values joined by " // " — match against each part.
  const parts = String(value == null ? '' : value).split(/\s*\/\/\s*/);
  for(const part of parts){
    const v = part.toLowerCase();
    if(q && v.includes(q)) return true;
    if(phoneMode && qDigits.length >= 4){
      const d = digitsOf(part);
      if(d && d.includes(qDigits)) return true;
    }
  }
  return false;
}

// Filter rows where ANY cell matches the query (case-insensitive, partial).
// Text queries match by substring; phone queries also match by digit-substring.
function matchRecords(query, data){
  const q = (query || '').trim().toLowerCase();
  if(!q) return [];
  const qDigits = digitsOf(query);
  const phoneMode = isPhoneQuery(query);
  return data.records.filter(r => data.headers.some(h => matchHit(r[h], q, qDigits, phoneMode)));
}

/* =========================================================================
   ICONS + VALUE FORMATTING

function iconFor(label){
  const n = label.toLowerCase();
  if(/e-?mail/.test(n)) return 'mail';
  if(/phone|mobile|cell|tel\b/.test(n)) return 'phone';
  if(/date|time|created|joined/.test(n)) return 'calendar';
  if(/amount|spent|price|total|cost|revenue|value|paid|fee|balance|\$/.test(n)) return 'circle-dollar-sign';
  if(/location|city|region|country|address|state|office|site/.test(n)) return 'map-pin';
  if(/status|stage/.test(n)) return 'activity';
  if(/plan|tier|subscription|package|membership/.test(n)) return 'crown';
  if(/note|comment|remark|detail|description/.test(n)) return 'sticky-note';
  if(/\bid\b|reference|ref\b|number|account/.test(n)) return 'hash';
  if(/event|action|activity|type|category/.test(n)) return 'zap';
  if(/name|customer|client|employee/.test(n)) return 'user';
  if(/company|org|business/.test(n)) return 'building-2';
  if(/source|channel|campaign/.test(n)) return 'git-branch';
  return 'circle-dot';
}
function isMoney(label){ return /amount|spent|price|total|cost|revenue|value|paid|fee|balance/.test(label.toLowerCase()); }
function isLong(label){ return /note|comment|remark|description|detail/.test(label.toLowerCase()); }

function statusClass(val){
  const v = (val||'').toLowerCase();
  if(/active|paid|won|complete|success|current/.test(v)) return 'cyan';
  if(/trial|lead|pending|prospect|opportunity|new|open/.test(v)) return 'gold';
  if(/closed|cancel|churn|lost|expired|inactive/.test(v)) return 'mute';
  return '';
}

function fmtDate(v){
  const t = Date.parse(v);
  if(isNaN(t)) return v;
  return new Date(t).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- privacy masking ---- */
function maskEmail(v){
  const m = String(v).trim().match(/^([^\s@]+)@([^\s@]+)$/);
  if(!m) return v;
  return m[1][0] + '***@' + m[2];
}
function maskPhone(v){
  const d = digitsOf(v);
  if(d.length < 7) return v;
  return d.slice(0,4) + '-****' + d.slice(-3);
}
// Fully mask the searched query for the results header — reveal nothing.
function maskQuery(query){
  const t = (query || '').trim();
  if(!t) return '';
  return '•'.repeat(Math.min(t.length, 24));
}
// Returns the display value for a cell, masking emails everywhere and phone columns.
function maskCell(header, value, phoneSet){
  const v = (value == null ? '' : String(value)).trim();
  if(!v) return '';
  if(EMAIL_RE.test(v)) return maskEmail(v);
  const hl = header.toLowerCase();
  const isPhoneCol = phoneSet.has(header) || /phone|mobile|cell|tel\b|whatsapp|contact number|msisdn/.test(hl);
  if(isPhoneCol && digitsOf(v).length >= 7) return maskPhone(v);
  return v;
}

function renderResults(query, matched, data, cls){
  const phoneSet = new Set(cls.phoneCols || []);
  const emailSet = new Set(cls.emailCols || []);
  const q = (query || '').trim().toLowerCase();
  const qDigits = digitsOf(query);
  const phoneMode = isPhoneQuery(query);
  const n = matched.length;

  // FIX 1: hide Email & Phone columns entirely (by classification or header name)
  const isContactCol = h => emailSet.has(h) || phoneSet.has(h) ||
    /e-?mail|phone|mobile|cell|tel\b|whatsapp|contact number|msisdn/.test(h.toLowerCase());
  const cols = data.headers.filter(h => !isContactCol(h));

  // FIX 2: place "Closer Name" immediately after "Lead Qualifier" (if both exist)
  const closerIdx = cols.findIndex(h => /closer/i.test(h));
  const qualIdx = cols.findIndex(h => /lead\s*qualifier/i.test(h));
  if(closerIdx !== -1 && qualIdx !== -1 && closerIdx !== qualIdx + 1){
    const [closer] = cols.splice(closerIdx, 1);
    const insertAt = cols.findIndex(h => /lead\s*qualifier/i.test(h)) + 1;
    cols.splice(insertAt, 0, closer);
  }

  // FIX 2: fully mask the searched query in the header (no characters revealed)
  const maskedQuery = maskQuery(query);

  // cap rendered rows so a broad match (e.g. a whole domain) can't freeze the page
  const CAP = 500;
  const rows = matched.slice(0, CAP);
  const capped = n > CAP;

  const headHtml = `<tr><th class="rownum">#</th>${cols.map(h => `<th><span class="hcol">${esc(h)}</span></th>`).join('')}</tr>`;

  const bodyHtml = rows.map((r, i) => {
    const cells = cols.map(h => {
      const raw = r[h];
      const hit = matchHit(raw, q, qDigits, phoneMode);
      const display = maskCell(h, raw, phoneSet);
      const inner = display ? esc(display) : '<span class="cell-empty">—</span>';
      return `<td class="${hit ? 'cell-hit' : ''}" title="${esc(display)}">${inner}</td>`;
    }).join('');
    return `<tr><td class="rownum">${i + 1}</td>${cells}</tr>`;
  }).join('');

  main.innerHTML = `<div class="results">
    <div class="table-bar">
      <div class="th-count"><b>${n}</b> ${n === 1 ? 'record' : 'records'} found for <span class="th-q">${esc(maskedQuery)}</span>${capped ? ` <span class="th-cap">· showing first ${CAP}</span>` : ''}</div>
      <div class="dl-group">
        <button class="dl png" id="dlPng" type="button"><i data-lucide="image-down"></i> PNG</button>
        <button class="dl jpg" id="dlJpg" type="button"><i data-lucide="file-image"></i> JPG</button>
      </div>
    </div>

    <div id="captureArea">
      <div class="cap-title"><span class="dot"></span>${esc(CONFIG.PRODUCT_NAME)} · results for “${esc(maskedQuery)}”</div>
      <div class="sheet-wrap">
        <table class="sheet">
          <thead>${headHtml}</thead>
          <tbody>${bodyHtml}</tbody>
        </table>
      </div>
      <div class="capture-watermark">
        <div class="wm-l">
          <div class="wm-mark"><i data-lucide="radar"></i></div>
          <div class="wm-name">${esc(CONFIG.PRODUCT_NAME)}</div>
        </div>
        <div class="wm-date" id="wmDate"></div>
      </div>
    </div>
  </div>`;

  lucide.createIcons();
  document.getElementById('dlPng').addEventListener('click', () => downloadCard('png', query));
  document.getElementById('dlJpg').addEventListener('click', () => downloadCard('jpg', query));
}

/* =========================================================================
   DOWNLOAD (html2canvas) — captures only #captureArea, adds dated watermark
   ========================================================================= */
async function downloadCard(format, name){
  const area = document.getElementById('captureArea');
  if(!area || !window.html2canvas) return;
  const pngBtn = document.getElementById('dlPng');
  const jpgBtn = document.getElementById('dlJpg');
  const btn = format === 'png' ? pngBtn : jpgBtn;
  const orig = btn.innerHTML;
  pngBtn.disabled = jpgBtn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader-2"></i> Rendering…';
  lucide.createIcons();

  // dated watermark
  const now = new Date();
  document.getElementById('wmDate').textContent = 'Generated on ' + now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + ' · ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  area.classList.add('capturing');

  try{
    const canvas = await html2canvas(area, {
      backgroundColor: '#0A0E1A',
      scale: 2,
      useCORS: true,
      logging: false,
      onclone: (doc) => {
        const a = doc.getElementById('captureArea');
        if(a){ a.style.padding = '30px'; a.style.background = '#0A0E1A'; }
        // expand the scroll container so the FULL table is captured
        const w = doc.querySelector('#captureArea .sheet-wrap');
        if(w){ w.style.maxHeight = 'none'; w.style.overflow = 'visible'; }
        // header text uses background-clip:text (unsupported by html2canvas) — force solid hex
        doc.querySelectorAll('#captureArea table.sheet thead th .hcol').forEach(el => {
          el.style.background = 'none';
          el.style.webkitBackgroundClip = 'border-box';
          el.style.backgroundClip = 'border-box';
          el.style.color = '#aef0ff';
          el.style.webkitTextFillColor = '#aef0ff';
        });
      }
    });
    const safe = (name || 'record').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'').toLowerCase();
    const stamp = now.toISOString().slice(0,10);
    const link = document.createElement('a');
    if(format === 'png'){
      link.href = canvas.toDataURL('image/png');
      link.download = `datasearch-${safe}-${stamp}.png`;
    } else {
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.download = `datasearch-${safe}-${stamp}.jpg`;
    }
    link.click();
  } catch(e){
    console.error('Export failed', e);
  } finally {
    area.classList.remove('capturing');
    pngBtn.disabled = jpgBtn.disabled = false;
    btn.innerHTML = orig;
    lucide.createIcons();
  }
}

  if(CONFIG.SHEET_CSV_URL) list.push(CONFIG.SHEET_CSV_URL);
  if(CONFIG.SHEET_ID){
    const id = CONFIG.SHEET_ID, gid = CONFIG.GID || '0';
    list.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&gid=${gid}`);
    list.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`);
  }
  return list;
}

function loadData(){
  if(dataReady) return dataReady;
  dataReady = (async () => {
    let csv = DEMO_CSV;
    const candidates = csvCandidates();
    if(candidates.length){
      let got = false, lastErr = null;
      for(const url of candidates){
        try{
          const res = await fetch(url, { cache:'no-store' });
          if(!res.ok){ lastErr = new Error('HTTP '+res.status); continue; }
          const text = await res.text();
          // reject HTML login/error pages — we want actual CSV
          if(text && text.trim() && text.trim()[0] !== '<'){ csv = text; got = true; break; }
          lastErr = new Error('Non-CSV response');
        }catch(e){ lastErr = e; }
      }
      if(!got) throw (lastErr || new Error('Could not load sheet'));
    }
    DATA = toRecords(csv);
    CLS = classify(DATA.headers, DATA.records);
    return DATA;
  })().catch(e => { dataReady = null; throw e; }); // allow retry on failure
  return dataReady;
}

/* =========================================================================
   SEARCH FLOW
   ========================================================================= */
const form = document.getElementById('searchForm');
const input = document.getElementById('q');
const badge = document.getElementById('typeBadge');
const hint = document.getElementById('hint');
const btn = document.getElementById('searchBtn');

function updateBadge(){
  const t = detectType(input.value);
  form.classList.toggle('typing', !!input.value.trim());
  badge.className = 'type-badge' + (t ? ' show ' + t : '');
  badge.textContent = t ? (t === 'email' ? 'Email' : 'Phone') : '';
  if(!document.body.classList.contains('results-mode')){
    if(!input.value.trim()) hint.textContent = '';
    else if(t === 'email') hint.textContent = 'Detected an email address.';
    else if(t === 'phone') hint.textContent = 'Detected a phone number.';
    else hint.textContent = 'Keep typing an email or phone number…';
    hint.classList.remove('err');
  }
}
input.addEventListener('input', updateBadge);

async function runSearch(query){
  const q = (query ?? input.value).trim();
  input.value = q;
  updateBadge();

  document.body.classList.add('results-mode');
  window.scrollTo({ top:0, behavior:'instant' in window ? 'instant' : 'auto' });

  if(!q){
    renderError(q);
    return;
  }

  btn.disabled = true;
  renderLoading();
  try{
    await loadData();
    const matched = matchRecords(q, DATA);
    if(!matched.length){ renderEmpty(q); }
    else { renderResults(q, matched, DATA, CLS); }
  } catch(e){
    console.error(e);
    renderFetchError();
  } finally {
    btn.disabled = false;
  }
}

form.addEventListener('submit', (e) => { e.preventDefault(); runSearch(); });

document.getElementById('newSearch').addEventListener('click', () => {
  document.body.classList.remove('results-mode');
  main.innerHTML = '';
  input.value = '';
  updateBadge();
  window.scrollTo({ top:0, behavior:'smooth' });
  setTimeout(() => input.focus(), 300);
});

/* example chips (hidden when there are none — live sheet data is unknown) */
(function buildExamples(){
  const wrap = document.getElementById('examples');
  if(!DEMO_EXAMPLES.length){ wrap.style.display = 'none'; return; }
  DEMO_EXAMPLES.forEach(ex => {
    const c = document.createElement('button');
    c.type = 'button'; c.className = 'chip'; c.textContent = ex;
    c.addEventListener('click', () => { runSearch(ex); });
    wrap.appendChild(c);
  });
})();

/* boot */
document.getElementById('brandName').innerHTML = CONFIG.PRODUCT_NAME.replace(/^(.*?)(Search|search)?$/,(m,a,b)=> b ? `${a}<b>${b}</b>` : a);
lucide.createIcons();
input.focus();
