<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD — Start of Day Report</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{visibility:hidden}

:root{
  --blue:#2563EB;
  --red:#DC2626;
  --gold:#FBBF24;
  --green:#16A34A;
  --purple:#7C3AED;
  --bg:#F8FAFC;
  --bg2:#F1F5F9;
  --white:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --text2:#64748B;
  --text3:#94A3B8;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);
  color:var(--text);
  min-height:100vh;
  padding-top:80px;
  display:flex;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 40% 30% at 10% 20%,rgba(37,99,235,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 35% 25% at 90% 80%,rgba(220,38,38,0.05) 0%,transparent 60%);
}

/* ═══ NAVBAR ═══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(226,232,240,0.8);
  height:80px;
  display:flex;align-items:center;
  padding:0 32px;
  justify-content:space-between;
  box-shadow:0 4px 24px rgba(0,0,0,0.04);
}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-brand-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--blue),var(--red));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  box-shadow:0 6px 20px rgba(37,99,235,0.3);
}
.nav-brand-text{font-size:1.15rem;font-weight:800;letter-spacing:-0.01em;}
.nav-brand-text .massive{color:var(--blue);}
.nav-brand-text .dynamics{color:var(--red);}

.nav-pills{
  display:flex;align-items:center;gap:4px;
  background:#F1F5F9;
  border-radius:999px;padding:5px;
  border:1px solid var(--border);
}
.nav-pill{
  padding:8px 24px;border-radius:999px;
  font-size:0.8rem;font-weight:600;
  text-decoration:none;color:var(--text2);
  background:transparent;border:none;
  transition:all 0.25s;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  letter-spacing:0.01em;
}
.nav-pill:hover{color:var(--text);background:rgba(255,255,255,0.8);}
.nav-pill.active{
  color:#fff;
  background:linear-gradient(135deg,var(--blue),var(--red));
  box-shadow:0 4px 16px rgba(37,99,235,0.35);
}

.nav-user{
  display:flex;align-items:center;gap:12px;
  cursor:pointer;position:relative;
  background:rgba(255,255,255,0.8);
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 16px 6px 6px;
  backdrop-filter:blur(10px);
  transition:all 0.2s;
}
.nav-user:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.nav-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--red));
  display:flex;align-items:center;justify-content:center;
  font-size:0.88rem;font-weight:800;color:#fff;
  border:2px solid var(--gold);
  box-shadow:0 0 0 3px rgba(251,191,36,0.2);
}
.nav-user-name{font-size:0.8rem;font-weight:700;color:var(--text);}
.nav-user-role{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.user-menu{
  display:none;position:absolute;right:0;top:calc(100% + 12px);
  background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:8px;min-width:200px;
  z-index:9999;box-shadow:0 20px 50px rgba(0,0,0,0.1);
}
.user-menu.show{display:block;}
.menu-hdr{padding:10px 12px;border-bottom:1.5px solid #CBD5E1;margin-bottom:6px;}
.menu-name{font-size:0.82rem;font-weight:700;color:var(--text);}
.menu-desig{font-size:0.65rem;color:var(--text3);margin-top:2px;}
.logout-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:10px;cursor:pointer;
  color:#ef4444;font-size:0.76rem;font-weight:600;transition:all 0.15s;
}
.logout-item:hover{background:#fef2f2;}

/* ═══ SIDEBAR ═══ */
.sidebar{
  position:fixed;top:80px;left:0;bottom:0;
  width:260px;
  background:#fff;
  border-right:1px solid var(--border);
  z-index:100;padding:28px 16px;
  overflow-y:auto;
  box-shadow:4px 0 20px rgba(0,0,0,0.03);
}
.sidebar-label{
  font-size:0.62rem;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--text3);
  padding:0 12px;margin-bottom:16px;
}
.dept-btn{
  width:100%;text-align:left;
  padding:12px 14px;border:1.5px solid transparent;
  background:transparent;border-radius:14px;
  color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.82rem;font-weight:500;cursor:pointer;
  transition:all 0.22s;
  display:flex;align-items:center;gap:12px;
  margin-bottom:6px;
}
.dept-btn:hover{
  color:var(--text);
  background:#F8FAFC;
  border-color:var(--border);
}
.dept-btn.active{
  color:#fff;font-weight:700;
  background:linear-gradient(135deg,#2563EB,#1D4ED8);
  border-color:transparent;
  box-shadow:0 6px 18px rgba(37,99,235,0.35);
}
.dept-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;background:#F1F5F9;flex-shrink:0;
  transition:all 0.2s;
}
.dept-btn.active .dept-icon{background:rgba(255,255,255,0.22);color:#fff;}
.dept-btn.active .dept-name{color:#fff;}
.dept-name{font-size:0.82rem;}

.sidebar-footer{
  position:absolute;bottom:16px;left:16px;right:16px;
  background:rgba(37,99,235,0.04);
  border:1px solid rgba(37,99,235,0.1);
  border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:8px;
}
.sidebar-footer-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:blink 1.5s ease infinite;
  flex-shrink:0;
}
.sidebar-footer-text{font-size:0.68rem;color:var(--text2);font-weight:500;}

/* ═══ MAIN ═══ */
.main{
  margin-left:260px;flex:1;
  padding:32px 36px;
  position:relative;z-index:1;
  min-height:calc(100vh - 80px);
}

/* ═══ PAGE HEADER ═══ */
.page-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.page-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:2.8rem;font-weight:700;
  color:var(--text);letter-spacing:-0.03em;line-height:1.1;
}
.page-title .highlight{color:var(--red);}
.page-sub{
  color:var(--text2);font-size:0.78rem;
  margin-top:6px;font-weight:500;
}
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(22,163,74,0.1);
  border:1.5px solid rgba(22,163,74,0.25);
  border-radius:999px;padding:8px 20px;
  font-size:0.72rem;color:var(--green);
  letter-spacing:0.06em;font-weight:700;
}
.live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:blink 1.5s ease infinite;
  box-shadow:0 0 8px var(--green);
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ═══ DEPT HEADER BANNER ═══ */
.dept-hdr{
  background:linear-gradient(135deg,#2563EB 0%,#4F46E5 50%,#DC2626 100%);
  border-radius:24px;
  padding:0 32px;
  height:110px;
  margin-bottom:24px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(37,99,235,0.25);
}
.dept-hdr::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.dept-hdr::after{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 70%);
  pointer-events:none;
}
.dept-hdr-icon{
  font-size:1.7rem;
  color:#fff;
  position:relative;z-index:1;
  background:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0.08));
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 8px 22px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.45);
  width:64px;height:64px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.dept-hdr-info{position:relative;z-index:1;}
.dept-hdr-name{
  font-size:1.5rem;font-weight:800;color:#fff;
  letter-spacing:-0.02em;font-family:'Space Grotesk',sans-serif;
}
.dept-hdr-sub{font-size:0.72rem;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:500;}
.dept-hdr-time{
  margin-left:auto;position:relative;z-index:1;
  text-align:right;
}
.dept-hdr-time-label{font-size:0.65rem;color:rgba(255,255,255,0.6);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
.dept-hdr-time-val{
  font-size:0.95rem;font-weight:700;
  color:var(--gold);font-family:'DM Mono',monospace;
  margin-top:4px;
}

/* ═══ KPI CARDS ═══ */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:16px;margin-bottom:24px;
}
.kpi-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px 16px;
  position:relative;overflow:hidden;
  transition:transform 0.25s,box-shadow 0.25s;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
  cursor:default;
}
.kpi-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,0.1);
}
.kpi-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;margin-bottom:14px;
  flex-shrink:0;
}
.kpi-label{
  font-size:0.62rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;
  line-height:1.3;
}
.kpi-val{
  font-size:2.8rem;font-weight:700;line-height:1;
  margin-bottom:8px;font-family:'Space Grotesk',sans-serif;
  letter-spacing:-0.03em;
}
.kpi-sub{font-size:0.65rem;color:var(--text3);font-weight:500;}

/* ═══ SECTION CARDS ═══ */
.section-card{
  background:#fff;border:2px solid #CBD5E1;
  border-radius:24px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.section-hdr{
  padding:16px 24px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1.5px solid #CBD5E1;
}
.section-hdr-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;
}
.section-hdr-title{
  font-size:0.8rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
}

/* Breakdown grid */
.breakdown-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
}
.breakdown-cell{
  padding:24px 20px;text-align:center;
  border-right:2px solid #CBD5E1;
}
.breakdown-cell:last-child{border-right:none;}
.breakdown-icon{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:1.4rem;
}
.breakdown-label{
  font-size:0.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text2);margin-bottom:8px;
}
.breakdown-val{
  font-size:2.2rem;font-weight:700;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:-0.02em;
}

/* Averages table */
.avg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.avg-table{width:100%;border-collapse:collapse;}
.avg-table th{
  padding:11px 16px;text-align:center;
  font-size:1rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  border-bottom:2px solid #94A3B8;
  background:#F1F5F9;
}
.avg-table th:first-child{text-align:left;}
.avg-table td{
  padding:12px 16px;font-size:1.2rem;
  font-weight:800;border-bottom:1.5px solid #CBD5E1;
}
.avg-table td:first-child{color:var(--text);text-align:left;}
.avg-table td:not(:first-child){text-align:center;font-family:'DM Mono',monospace;font-size: 1.2rem;font-weight: 800;}
.avg-table tr:last-child td{border-bottom:none;}
.avg-table tr:nth-child(even) td{background:#fafbfc;}

/* Closing avg */
.closing-grid{display:grid;grid-template-columns:repeat(4,1fr);}
.closing-cell{
  padding:28px 20px;text-align:center;
  border-right:2px solid #94A3B8;
  position:relative;
}
.closing-cell:last-child{border-right:none;}
.closing-label{
  font-size:0.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text2);margin-bottom:12px;
}
.closing-val{
  font-size:2.6rem;font-weight:800;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:-0.02em;margin-bottom:8px;
  color:#0f172a;
}
.closing-trend{
  height:40px;display:flex;align-items:flex-end;
  justify-content:center;gap:2px;
  margin-top:8px;
}
.trend-bar{
  width:4px;border-radius:2px;
  background:currentColor;opacity:0.3;
}
.trend-bar.active{opacity:1;}

/* Detail cards */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.detail-card{
  background:#fff;border:2px solid #CBD5E1;
  border-radius:20px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.detail-title{
  padding:14px 20px;font-size:0.7rem;
  font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;
  border-bottom:1.5px solid #CBD5E1;
  display:flex;align-items:center;gap:8px;
}
.mrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1.5px solid #CBD5E1;
  transition:background 0.12s;
}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:#fafbfc;}
.mrow-label{font-size:0.9rem;color:var(--text2);font-weight:500;}
.mrow-val{font-size:1.5rem;font-weight:700;font-family:'DM Mono',monospace;}
.mrow-val.blue{color:#1d4ed8;}
.mrow-val.red{color:#b91c1c;}
.mrow-val.green{color:#15803d;}
.mrow-val.gold{color:#b45309;}
.mrow-val.purple{color:#6d28d9;}
.mrow-val.cyan{color:#0e7490;}
.mrow-val.orange{color:#c2410c;}
.mrow-val.dim{color:var(--text3);}
.mrow-val.text{color:#0f172a;}
.divider-label{
  padding:8px 20px;font-size:0.62rem;
  font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text3);
  background:#F1F5F9;border-bottom:1.5px solid #CBD5E1;
}

/* Team tables */
.team-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.team-table thead th{
  padding:10px 14px;text-align:center;
  font-size:0.62rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text2);
  background:#E2E8F0;
  border-bottom:2px solid #94A3B8;
  border-right:1.5px solid #CBD5E1;
}
.team-table thead th:first-child{text-align:left;padding-left:20px;border-right:1.5px solid #CBD5E1;}
.team-table thead th:last-child{border-right:none;}
.team-table tbody tr{border-bottom:1.5px solid #CBD5E1;transition:background 0.1s;}
.team-table tbody tr:hover{background:#F8FAFC;}
.team-table tbody td{padding:11px 14px;text-align:center;color:var(--text);font-weight:600;font-size:0.88rem;border-right:1.5px solid #E2E8F0;}
.team-table tbody td:first-child{text-align:left;padding-left:20px;font-weight:700;font-size:0.88rem;color:var(--text);border-right:1.5px solid #CBD5E1;}
.team-table tbody td:last-child{border-right:none;}

/* Loading */
.loading-wrap{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.8rem;color:var(--text2);font-weight:500;}
.empty-wrap{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--text3);}
.empty-icon{font-size:2.5rem;opacity:0.3;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes pulse1{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.4);opacity:0.1;}}
</style>
</head>
<body>
<script>
(function(){
  const t=localStorage.getItem('ds_token');
  if(!t){document.documentElement.style.visibility='hidden';window.location.replace('/login.html');return;}
  const u=JSON.parse(localStorage.getItem('ds_user')||'{}');
  if(u.role!=='admin' && u.pages && !u.pages.includes('sod')){
    document.documentElement.style.visibility='hidden';
    window.location.replace('/no-access.html');
    return;
  }
  document.documentElement.style.visibility='visible';
})();

async function checkDeviceStatus(){
  try{
    const t = localStorage.getItem('ds_token');
    if(!t) return;
    const res = await fetch('/api/me', { headers: { 'authorization': t } });
    if(res.status === 401){
      const data = await res.json();
      if(data.error === 'DEVICE_RESET'){
        localStorage.removeItem('ds_token');
        localStorage.removeItem('ds_user');
        localStorage.removeItem('ds_device_token');
        alert('Your device has been reset by admin. Please login again with new device code.');
        window.location.replace('/login.html');
      }
    }
  }catch(e){ /* offline or server unreachable - skip this check */ }
}
setInterval(checkDeviceStatus, 30000);
checkDeviceStatus();
</script>

function renderMarketing(data){
  const num = (r,c) => data[r]?.[c] ?? 0;
  // Build a platform from its sheet header row R (1-indexed). Each block:
  //   R   header (TOTAL RECEIVED in O)   R+1 Today RECEIVED / TOTAL QUALIFIED(O)
  //   R+2 Today QUALIFIED / TOTAL CLOSED(O)   R+3 Today CLOSED / BUDGET(O)   R+4 un-cat
  function plat(name,label,color,bg,R,budget_label){
    const h=R-1; // data index of header row
    return { name,label,color,bg,budget_label,
      recv:num(h+1,2), qual:num(h+2,2), closed:num(h+3,2),
      a:num(h+1,5), b:num(h+2,5), c:num(h+3,5), uncat:num(h+4,5),
      recv_ov:num(h+1,8), recv_mn:num(h+2,8), recv_td:num(h+3,8),
      qual_ov:num(h+1,11), qual_mn:num(h+2,11), qual_td:num(h+3,11),
      t_recv:num(h,14), t_qual:num(h+1,14), t_closed:num(h+2,14), budget:num(h+3,14) };
  }
  const platforms=[
    plat('TA','TA Class Ads','#1D4ED8','linear-gradient(135deg,#1D4ED826,#1D4ED80a)',31,'TA Budget'),
    plat('Preceptor','Preceptor Ads','#DC2626','linear-gradient(135deg,#DC262626,#DC26260a)',37,'PH Budget'),
    plat('WhatsApp','WhatsApp Ads','#16A34A','linear-gradient(135deg,#16A34A26,#16A34A0a)',43,'WhatsApp Budget'),
    plat('FPX','FPX Ads','#7C3AED','linear-gradient(135deg,#7C3AED26,#7C3AED0a)',49,'FPX Budget'),
    plat('MTC','MTC Ads','#EA580C','linear-gradient(135deg,#EA580C26,#EA580C0a)',55,'MTC Budget'),
    plat('TikTok','TikTok Ads','#0891B2','linear-gradient(135deg,#0891B226,#0891B20a)',61,'TikTok Budget'),
  ];
  const cl_total   = num(68,2); // C69
  const cl_3months = num(69,2); // C70
  const cl_month   = num(70,2); // C71
  const cl_today   = num(71,2); // C72

  // Format a budget value as currency ($1,234) — keeps "—" for empty cells

function renderQualifier(data){

    today_st:    data[89]?.[5] ?? 0,  // F90

    st_avg:      data[91]?.[5] ?? 0,  // F92

    monthly_avg: data[93]?.[5] ?? 0,  // F94

  };

  const MONTH_LABELS = ['Feb','Mar','Apr','May','Jun','Jul'];

  // Banner stat box (transparent bg, black text)
  function bBox(label,val){
    return `<div style="background:transparent;border:none;border-radius:12px;padding:8px 16px;text-align:center;min-width:78px;">
      <div style="font-size:0.55rem;font-weight:700;text-transform:uppercase;color:rgba(0,0,0,0.6);letter-spacing:0.06em;white-space:nowrap;">${label}</div>

  // 6-month vertical comparison bar chart
  function barChart(months,color){
    const vals = months.map(m => { const n=parseFloat(m); return isNaN(n)?0:n; });
    const max = Math.max(...vals, 1);
    return `
    <div style="padding:18px 16px 14px;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px;">
        ${vals.map((val,i)=>{
          const h = Math.max((val/max)*100, 3);
          const isMax = val===max && val>0;

            <div title="${MONTH_LABELS[i]} 2026: ${val}" style="width:100%;max-width:34px;height:${h}%;min-height:4px;border-radius:7px 7px 0 0;background:linear-gradient(180deg,${color} 0%,${color}aa 100%);box-shadow:${isMax?`0 4px 14px ${color}66`:'none'};transition:height 0.5s ease;"></div>

      </div>
      <div style="display:flex;justify-content:space-between;gap:8px;margin-top:10px;border-top:1.5px solid #CBD5E1;padding-top:9px;">
        ${MONTH_LABELS.map(l=>`<div style="flex:1;text-align:center;font-size:0.58rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;">${l}</div>`).join('')}
      </div>
    </div>`;
  }

  // Daily leads trend: dates N77:N107, cutoff date P77, leads from valCol
  // (Qualifier = col O index 14, 4th Floor = col Q index 16)
  function buildTrend(valCol){
    const fmtKey   = dt => dt.toLocaleDateString('en-CA',{timeZone:'Asia/Karachi'});
    const fmtLabel = dt => dt.toLocaleDateString('en-GB',{timeZone:'Asia/Karachi',day:'2-digit',month:'short'});
    const fmtFull  = dt => dt.toLocaleDateString('en-GB',{timeZone:'Asia/Karachi',day:'2-digit',month:'short',year:'numeric'});
    let cutoff=null;
    const praw=data[76]?.[15]; // P77 cutoff date
    if(praw){ const c=new Date(praw); if(!isNaN(c)) cutoff=c; }
    if(!cutoff) cutoff=new Date(); // fall back to today if P77 empty
    const cutKey=fmtKey(cutoff);
    const pts=[];
    for(let r=76;r<=106;r++){ // rows 77-107
      const draw=data[r]?.[13], vraw=data[r]?.[valCol]; // N, valCol
      if(draw===''||draw==null) continue;
      const dt=new Date(draw); if(isNaN(dt)) continue;
      if(fmtKey(dt) > cutKey) continue; // only up to cutoff date
      const val=parseFloat(vraw);
      pts.push({ value:isNaN(val)?0:val, label:fmtLabel(dt), dateLabel:fmtFull(dt) });
    }
    return pts;
  }
  const qTrend = buildTrend(14); // O77:O107
  const fTrend = buildTrend(16); // Q77:Q107

  // Responsive SVG line chart
  function lineChart(points,color){
    if(!points.length) return '<div style="padding:40px 16px;text-align:center;color:var(--text3);font-size:0.78rem;">No trend data available</div>';
    const W=780,H=250,padL=36,padR=18,padT=18,padB=36;
    const innerW=W-padL-padR, innerH=H-padT-padB, n=points.length;
    const rawMax=Math.max(...points.map(p=>p.value),1);
    const niceMax=Math.max(Math.ceil(rawMax/10)*10,10);
    const X=i=> padL+(n<=1?innerW/2:(i/(n-1))*innerW);
    const Y=v=> padT+innerH-(v/niceMax)*innerH;
    let grid="";
    for(let t=0;t<=4;t++){ const gv=niceMax*t/4, gy=Y(gv);
      grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#E2E8F0" stroke-width="1"/>`;
      grid+=`<text x="${padL-7}" y="${(gy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#94A3B8" font-family="DM Mono,monospace">${Math.round(gv)}</text>`;
    }
    const linePts=points.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(" ");
    const area=`M ${X(0).toFixed(1)},${Y(0).toFixed(1)} `+points.map((p,i)=>`L ${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(" ")+` L ${X(n-1).toFixed(1)},${Y(0).toFixed(1)} Z`;
    const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.value).toFixed(1)}" r="2.5" fill="#fff" stroke="${color}" stroke-width="1.6"><title>${p.dateLabel}: ${p.value}</title></circle>`).join("");
    const valLabels=points.map((p,i)=>`<text x="${X(i).toFixed(1)}" y="${(Y(p.value)-9).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="800" fill="${color}" stroke="#ffffff" stroke-width="2.6" paint-order="stroke" stroke-linejoin="round" font-family="DM Mono,monospace">${p.value}</text>`).join("");
    const step=Math.max(1,Math.ceil(n/8)); let xl="";
    points.forEach((p,i)=>{ if(i%step===0||i===n-1) xl+=`<text x="${X(i).toFixed(1)}" y="${H-12}" text-anchor="middle" font-size="8.5" fill="#94A3B8" font-family="DM Mono,monospace">${p.label}</text>`; });
    const gid="lcg"+color.replace(/[^a-zA-Z0-9]/g,"");
    return `
    <div style="padding:14px 12px 10px;">
      <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;">
        <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.26"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient></defs>
        ${grid}
        <path d="${area}" fill="url(#${gid})"/>
        <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
        ${valLabels}
        ${xl}
      </svg>
    </div>`;
  }

    const closingCol=`

function renderRevived(data){
  const rv_today       = data[120]?.[2] ?? 0;  // C121

  const rv_3month_avg  = data[127]?.[2] ?? 0;  // C128 Last 3 Month
  const rv_monthly_avg = data[128]?.[2] ?? 0;  // C129 Current Monthly
  const rv_today_avg   = data[129]?.[2] ?? 0;  // C130 Today
  // Closing average derived from totals: Total Closed / Total Revived
  const closingRatio = (closed, revived) => {
    const c = parseFloat(closed)||0, r = parseFloat(revived)||0;
    return r > 0 ? (c / r) : 0;
  };
  const maheen_revived = data[144]?.[8] ?? 0;  // I145 TOTAL Revived
  const maheen_closed  = data[144]?.[9] ?? 0;  // J145 TOTAL Closed
  const maheen_avg     = closingRatio(maheen_closed, maheen_revived);
  const khurram_revived= data[159]?.[8] ?? 0;  // I160 TOTAL Revived
  const khurram_closed = data[159]?.[9] ?? 0;  // J160 TOTAL Closed
  const khurram_avg    = closingRatio(khurram_closed, khurram_revived);
  const maheen_members=[data[133],data[134],data[135],data[136],data[137],data[138],data[139],data[140]].filter(r=>r?.[1]&&r[1]!=='');
  const khurram_members=[data[146],data[147],data[148],data[149],data[150],data[151],data[152],data[153]].filter(r=>r?.[1]&&r[1]!=='');

  // Banner stat box (transparent bg, black text)

function renderGeneric(data, deptName, icon){
  const rows = data.filter(r => r.some(c => c !== ''));
  let metrics = '';
  rows.forEach(row => {
    const label = String(row[0]||row[1]||'').trim();
    if(!label) return;
    let val = '';
    for(let i=1;i<row.length;i++){if(row[i]!==''){val=row[i];break;}}
    if(val !== '') metrics += mr(label, val, 'blue');
  });
  return `
    <div class="section-card">
      <div class="section-hdr">
        <div class="section-hdr-icon" style="background:rgba(37,99,235,0.1);"><i class="fa-solid ${icon}"></i></div>

      </div>
      ${metrics || '<div style="padding:20px;color:var(--text2);">No detailed data available</div>'}
    </div>
  `;
}

async function loadDept(sheet, deptName, icon, btnId){
  document.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+btnId);
  if(btn) btn.classList.add('active');

  document.getElementById('deptContent').innerHTML=`
    <div class="dept-hdr">
      <div class="dept-hdr-icon"><i class="fa-solid ${icon}"></i></div>
      <div class="dept-hdr-info"><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Fetching live data...</div></div>
    </div>
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading ${deptName}...</div></div>`;

  if(refreshTimer) clearInterval(refreshTimer);
  let hasRendered = false;

  async function fetch_render(){
    try{
      const cacheKey=sheet;
      const now=Date.now();
      let json;

      if(dataCache[cacheKey]&&(now-dataCache[cacheKey].ts)<CACHE_TTL){
        json=dataCache[cacheKey].data;
      } else {
        const controller=new AbortController();
        const timeoutId=setTimeout(()=>controller.abort(),15000);
        try{
          const res=await fetch(SCRIPT_URL+'?sheet='+encodeURIComponent(sheet)+'&t='+now,{cache:'no-store',signal:controller.signal});
          json=await res.json();
        }finally{ clearTimeout(timeoutId); }
        if(json.success) dataCache[cacheKey]={data:json,ts:now};
      }

      if(!json||!json.success){
        if(!hasRendered) document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><div>Data load failed</div></div>';
        return;
      }

      const now2=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      let content='';
      if(deptName==='Organic & Pop-Up') content=renderOrganic(json.data);
      else if(deptName==='Marketing') content=renderMarketing(json.data);
      else if(deptName==='Qualifier & 4th Floor') content=renderQualifier(json.data);
      else if(deptName==='Revived Leads') content=renderRevived(json.data);
      else if(deptName==='Closed Leads') content=renderClosed(json.data);
      else content=renderGeneric(json.data,deptName,icon);

      document.getElementById('deptContent').innerHTML=`
        <div class="dept-hdr">
          <div class="dept-hdr-icon"><i class="fa-solid ${icon}"></i></div>
          <div class="dept-hdr-info"><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Live data · 30s auto-refresh</div></div>
          <div class="dept-hdr-time">
            <div class="dept-hdr-time-label">LAST UPDATED</div>
            <div class="dept-hdr-time-val">${now2}</div>
          </div>
        </div>
        ${content}`;
      hasRendered = true;
    }catch(e){
      console.error(e);
      // Keep the existing dashboard on refresh failures - only show error if nothing rendered yet
      if(!hasRendered){
        document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><div>Connection error — retrying in 30s...</div></div>';
      }
    }
  }

  fetch_render();
  // Skip refresh while the tab is hidden (saves API quota); next visible tick refreshes
  refreshTimer=setInterval(()=>{ if(!document.hidden) fetch_render(); },30000);
}

loadDept('SOD','Organic & Pop-Up','fa-inbox','Organic');
</script>
</body>
</html>
