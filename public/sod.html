<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD — Start of Day Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0E1A;--card:#111827;--border:#1e2d45;--cyan:#00D4FF;--gold:#FFD700;--text:#e2e8f0;--muted:#64748b;}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:0.95rem;letter-spacing:0.1em;}
.nav-logo-text span{color:var(--cyan);}
body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);min-height:100vh;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--gold),transparent);}
</style>
</head>
<body>
<script>
const _t = localStorage.getItem('ds_token');
if (!_t) { document.documentElement.style.visibility='hidden'; window.location.replace('/login.html'); }
else document.documentElement.style.visibility='visible';
</script>

<nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,14,26,0.95);border-bottom:1px solid #1e2d45;backdrop-filter:blur(12px);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;">
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#00D4FF,#FFD700);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">⚡</div>
    <div class="nav-logo-text">START OF <span>DAY</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:4px;">
    <a href="/index.html" style="padding:8px 20px;border-radius:8px;font-size:0.78rem;font-family:'DM Mono',monospace;letter-spacing:0.06em;text-decoration:none;color:#64748b;background:transparent;border:1px solid transparent;transition:all 0.2s;" onmouseover="this.style.color='#e2e8f0';this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='#64748b';this.style.background='transparent'">⚡ DataSearch</a>
    <a href="/sod.html" style="padding:8px 20px;border-radius:8px;font-size:0.78rem;font-family:'DM Mono',monospace;letter-spacing:0.06em;text-decoration:none;color:#00D4FF;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);transition:all 0.2s;">☀️ SOD</a>
    <a href="/eod.html" style="padding:8px 20px;border-radius:8px;font-size:0.78rem;font-family:'DM Mono',monospace;letter-spacing:0.06em;text-decoration:none;color:#64748b;background:transparent;border:1px solid transparent;transition:all 0.2s;" onmouseover="this.style.color='#e2e8f0';this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='#64748b';this.style.background='transparent'">🌙 EOD</a>
  </div>
  <div id="userWidget" style="position:relative;display:flex;align-items:center;">
    <div onclick="toggleUserMenu()" style="display:flex;align-items:center;gap:10px;cursor:pointer;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);border-radius:50px;padding:6px 14px 6px 6px;transition:all 0.2s;" onmouseover="this.style.background='rgba(0,212,255,0.12)'" onmouseout="this.style.background='rgba(0,212,255,0.06)'">
      <div id="userAvatar" style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#00D4FF,#FFD700);display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:600;color:#0A0E1A;font-family:monospace;"></div>
      <div style="display:flex;flex-direction:column;line-height:1.2;">
        <span id="userDisplayName" style="font-size:0.76rem;color:#e2e8f0;font-family:monospace;"></span>
        <span id="userDisplayRole" style="font-size:0.58rem;color:#00D4FF;letter-spacing:0.08em;text-transform:uppercase;"></span>
      </div>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
    <div id="userMenu" style="display:none;position:absolute;right:0;top:calc(100% + 10px);background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:8px;min-width:190px;z-index:9999;box-shadow:0 20px 40px rgba(0,0,0,0.5);">
      <div style="padding:10px 12px;border-bottom:1px solid #1e2d45;margin-bottom:6px;">
        <div id="menuUserName" style="font-size:0.8rem;color:#e2e8f0;font-family:monospace;"></div>
        <div id="menuUserDesig" style="font-size:0.68rem;color:#64748b;font-family:monospace;margin-top:2px;"></div>
      </div>
      <div onclick="dsLogout()" style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#ff4d6d;font-size:0.78rem;font-family:monospace;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,77,109,0.1)'" onmouseout="this.style.background='transparent'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </div>
    </div>
  </div>
</nav>

<div style="padding-top:56px;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
  <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--cyan);">SOD</h1>
  <p style="color:var(--muted);font-size:0.85rem;">Start of Day — Coming Soon</p>
</div>

<script>
const dsUser = JSON.parse(localStorage.getItem('ds_user') || '{}');
const initials = (dsUser.name || dsUser.username || 'U').charAt(0).toUpperCase();
document.getElementById('userAvatar').textContent = initials;
document.getElementById('userDisplayName').textContent = dsUser.name || dsUser.username || 'User';
document.getElementById('userDisplayRole').textContent = dsUser.designation || dsUser.role || 'User';
document.getElementById('menuUserName').textContent = dsUser.name || 'User';
document.getElementById('menuUserDesig').textContent = dsUser.designation || dsUser.role || '';

function toggleUserMenu() {
  const menu = document.getElementById('userMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
  const widget = document.getElementById('userWidget');
  if (widget && !widget.contains(e.target)) {
    document.getElementById('userMenu').style.display = 'none';
  }
});
function dsLogout() {
  const t = localStorage.getItem('ds_token');
  fetch('/api/logout', { method: 'POST', headers: { 'authorization': t } });
  localStorage.removeItem('ds_token');
  localStorage.removeItem('ds_user');
  window.location.replace('/login.html');
}
</script>
</body>
</html>
