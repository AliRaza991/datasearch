<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD — Start of Day Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{visibility:hidden}

:root{
  --blue:#2563EB;
  --red:#DC2626;
  --gold:#FBBF24;
  --green:#16A34A;
  --purple:#7C3AED;
  --bg:#F8FAFC;
  --bg2:#F1F5F9;
  --white:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --text2:#64748B;
  --text3:#94A3B8;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);
  color:var(--text);
  min-height:100vh;
  padding-top:80px;
  display:flex;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 40% 30% at 10% 20%,rgba(37,99,235,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 35% 25% at 90% 80%,rgba(220,38,38,0.05) 0%,transparent 60%);
}

/* ═══ NAVBAR ═══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(226,232,240,0.8);
  height:80px;
  display:flex;align-items:center;
  padding:0 32px;
  justify-content:space-between;
  box-shadow:0 4px 24px rgba(0,0,0,0.04);
}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-brand-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--blue),var(--red));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  box-shadow:0 6px 20px rgba(37,99,235,0.3);
}
.nav-brand-text{font-size:1.15rem;font-weight:800;letter-spacing:-0.01em;}
.nav-brand-text .massive{color:var(--blue);}
.nav-brand-text .dynamics{color:var(--red);}

.nav-pills{
  display:flex;align-items:center;gap:4px;
  background:#F1F5F9;
  border-radius:999px;padding:5px;
  border:1px solid var(--border);
}
.nav-pill{
  padding:8px 24px;border-radius:999px;
  font-size:0.8rem;font-weight:600;
  text-decoration:none;color:var(--text2);
  background:transparent;border:none;
  transition:all 0.25s;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  letter-spacing:0.01em;
}
.nav-pill:hover{color:var(--text);background:rgba(255,255,255,0.8);}
.nav-pill.active{
  color:#fff;
  background:linear-gradient(135deg,var(--blue),var(--red));
  box-shadow:0 4px 16px rgba(37,99,235,0.35);
}

.nav-user{
  display:flex;align-items:center;gap:12px;
  cursor:pointer;position:relative;
  background:rgba(255,255,255,0.8);
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 16px 6px 6px;
  backdrop-filter:blur(10px);
  transition:all 0.2s;
}
.nav-user:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.nav-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--red));
  display:flex;align-items:center;justify-content:center;
  font-size:0.88rem;font-weight:800;color:#fff;
  border:2px solid var(--gold);
  box-shadow:0 0 0 3px rgba(251,191,36,0.2);
}
.nav-user-name{font-size:0.8rem;font-weight:700;color:var(--text);}
.nav-user-role{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.user-menu{
  display:none;position:absolute;right:0;top:calc(100% + 12px);
  background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:8px;min-width:200px;
  z-index:9999;box-shadow:0 20px 50px rgba(0,0,0,0.1);
}
.user-menu.show{display:block;}
.menu-hdr{padding:10px 12px;border-bottom:1.5px solid #CBD5E1;margin-bottom:6px;}
.menu-name{font-size:0.82rem;font-weight:700;color:var(--text);}
.menu-desig{font-size:0.65rem;color:var(--text3);margin-top:2px;}
.logout-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:10px;cursor:pointer;
  color:#ef4444;font-size:0.76rem;font-weight:600;transition:all 0.15s;
}
.logout-item:hover{background:#fef2f2;}

/* ═══ SIDEBAR ═══ */
.sidebar{
  position:fixed;top:80px;left:0;bottom:0;
  width:260px;
  background:#fff;
  border-right:1px solid var(--border);
  z-index:100;padding:28px 16px;
  overflow-y:auto;
  box-shadow:4px 0 20px rgba(0,0,0,0.03);
}
.sidebar-label{
  font-size:0.62rem;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--text3);
  padding:0 12px;margin-bottom:16px;
}
.dept-btn{
  width:100%;text-align:left;
  padding:12px 14px;border:1.5px solid transparent;
  background:transparent;border-radius:14px;
  color:var(--text2);font-family:'Inter',sans-serif;
  font-size:0.82rem;font-weight:500;cursor:pointer;
  transition:all 0.22s;
  display:flex;align-items:center;gap:12px;
  margin-bottom:6px;
}
.dept-btn:hover{
  color:var(--text);
  background:#F8FAFC;
  border-color:var(--border);
}
.dept-btn.active{
  color:var(--blue);font-weight:700;
  background:#fff;
  border-color:var(--blue);
  box-shadow:0 4px 16px rgba(37,99,235,0.12),inset 3px 0 0 var(--blue);
}
.dept-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;background:#F1F5F9;flex-shrink:0;
  transition:all 0.2s;
}
.dept-btn.active .dept-icon{background:rgba(37,99,235,0.1);}
.dept-name{font-size:0.82rem;}

.sidebar-footer{
  position:absolute;bottom:16px;left:16px;right:16px;
  background:rgba(37,99,235,0.04);
  border:1px solid rgba(37,99,235,0.1);
  border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:8px;
}
.sidebar-footer-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:blink 1.5s ease infinite;
  flex-shrink:0;
}
.sidebar-footer-text{font-size:0.68rem;color:var(--text2);font-weight:500;}

/* ═══ MAIN ═══ */
.main{
  margin-left:260px;flex:1;
  padding:32px 36px;
  position:relative;z-index:1;
  min-height:calc(100vh - 80px);
}

/* ═══ PAGE HEADER ═══ */
.page-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.page-title{
  font-family:'Manrope',sans-serif;
  font-size:2.8rem;font-weight:700;
  color:var(--text);letter-spacing:-0.03em;line-height:1.1;
}
.page-title .highlight{color:var(--red);}
.page-sub{
  color:var(--text2);font-size:0.78rem;
  margin-top:6px;font-weight:500;
}
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(22,163,74,0.1);
  border:1.5px solid rgba(22,163,74,0.25);
  border-radius:999px;padding:8px 20px;
  font-size:0.72rem;color:var(--green);
  letter-spacing:0.06em;font-weight:700;
}
.live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:blink 1.5s ease infinite;
  box-shadow:0 0 8px var(--green);
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ═══ DEPT HEADER BANNER ═══ */
.dept-hdr{
  background:linear-gradient(135deg,#2563EB 0%,#4F46E5 50%,#DC2626 100%);
  border-radius:24px;
  padding:0 32px;
  height:110px;
  margin-bottom:24px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(37,99,235,0.25);
}
.dept-hdr::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.dept-hdr::after{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 70%);
  pointer-events:none;
}
.dept-hdr-icon{
  font-size:2.8rem;
  filter:drop-shadow(0 4px 12px rgba(255,255,255,0.3));
  position:relative;z-index:1;
  background:rgba(255,255,255,0.15);
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  flex-shrink:0;
}
.dept-hdr-info{position:relative;z-index:1;}
.dept-hdr-name{
  font-size:1.5rem;font-weight:800;color:#fff;
  letter-spacing:-0.02em;font-family:'Manrope',sans-serif;
}
.dept-hdr-sub{font-size:0.72rem;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:500;}
.dept-hdr-time{
  margin-left:auto;position:relative;z-index:1;
  text-align:right;
}
.dept-hdr-time-label{font-size:0.65rem;color:rgba(255,255,255,0.6);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
.dept-hdr-time-val{
  font-size:0.95rem;font-weight:700;
  color:var(--gold);font-family:'DM Mono',monospace;
  margin-top:4px;
}

/* ═══ KPI CARDS ═══ */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:16px;margin-bottom:24px;
}
.kpi-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px 16px;
  position:relative;overflow:hidden;
  transition:transform 0.25s,box-shadow 0.25s;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
  cursor:default;
}
.kpi-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,0.1);
}
.kpi-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;margin-bottom:14px;
  flex-shrink:0;
}
.kpi-label{
  font-size:0.62rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;
  line-height:1.3;
}
.kpi-val{
  font-size:2.8rem;font-weight:700;line-height:1;
  margin-bottom:8px;font-family:'Manrope',sans-serif;
  letter-spacing:-0.03em;
}
.kpi-sub{font-size:0.65rem;color:var(--text3);font-weight:500;}

/* ═══ SECTION CARDS ═══ */
.section-card{
  background:#fff;border:2px solid #CBD5E1;
  border-radius:24px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.section-hdr{
  padding:16px 24px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1.5px solid #CBD5E1;
}
.section-hdr-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;
}
.section-hdr-title{
  font-size:0.8rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
}

/* Breakdown grid */
.breakdown-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
}
.breakdown-cell{
  padding:24px 20px;text-align:center;
  border-right:2px solid #CBD5E1;
}
.breakdown-cell:last-child{border-right:none;}
.breakdown-icon{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:1.4rem;
}
.breakdown-label{
  font-size:0.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text2);margin-bottom:8px;
}
.breakdown-val{
  font-size:2.2rem;font-weight:700;
  font-family:'Manrope',sans-serif;
  letter-spacing:-0.02em;
}

/* Averages table */
.avg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.avg-table{width:100%;border-collapse:collapse;}
.avg-table th{
  padding:11px 16px;text-align:center;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  border-bottom:2px solid #94A3B8;
  background:#F1F5F9;
}
.avg-table th:first-child{text-align:left;}
.avg-table td{
  padding:12px 16px;font-size:0.88rem;
  font-weight:600;border-bottom:1.5px solid #CBD5E1;
}
.avg-table td:first-child{color:var(--text);text-align:left;}
.avg-table td:not(:first-child){text-align:center;font-family:'DM Mono',monospace;}
.avg-table tr:last-child td{border-bottom:none;}
.avg-table tr:nth-child(even) td{background:#fafbfc;}

/* Closing avg */
.closing-grid{display:grid;grid-template-columns:repeat(4,1fr);}
.closing-cell{
  padding:28px 20px;text-align:center;
  border-right:2px solid #94A3B8;
  position:relative;
}
.closing-cell:last-child{border-right:none;}
.closing-label{
  font-size:0.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text2);margin-bottom:12px;
}
.closing-val{
  font-size:2.6rem;font-weight:800;
  font-family:'Manrope',sans-serif;
  letter-spacing:-0.02em;margin-bottom:8px;
  color:#0f172a;
}
.closing-trend{
  height:40px;display:flex;align-items:flex-end;
  justify-content:center;gap:2px;
  margin-top:8px;
}
.trend-bar{
  width:4px;border-radius:2px;
  background:currentColor;opacity:0.3;
}
.trend-bar.active{opacity:1;}

/* Detail cards */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.detail-card{
  background:#fff;border:2px solid #CBD5E1;
  border-radius:20px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.detail-title{
  padding:14px 20px;font-size:0.7rem;
  font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;
  border-bottom:1.5px solid #CBD5E1;
  display:flex;align-items:center;gap:8px;
}
.mrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1.5px solid #CBD5E1;
  transition:background 0.12s;
}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:#fafbfc;}
.mrow-label{font-size:0.78rem;color:var(--text2);font-weight:500;}
.mrow-val{font-size:1rem;font-weight:700;font-family:'DM Mono',monospace;}
.mrow-val.blue{color:#1d4ed8;}
.mrow-val.red{color:#b91c1c;}
.mrow-val.green{color:#15803d;}
.mrow-val.gold{color:#b45309;}
.mrow-val.purple{color:#6d28d9;}
.mrow-val.cyan{color:#0e7490;}
.mrow-val.orange{color:#c2410c;}
.mrow-val.dim{color:var(--text3);}
.mrow-val.text{color:#0f172a;}
.divider-label{
  padding:8px 20px;font-size:0.62rem;
  font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text3);
  background:#F1F5F9;border-bottom:1.5px solid #CBD5E1;
}

/* Team tables */
.team-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.team-table thead th{
  padding:10px 14px;text-align:center;
  font-size:0.62rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text2);
  background:#E2E8F0;
  border-bottom:2px solid #94A3B8;
  border-right:1.5px solid #CBD5E1;
}
.team-table thead th:first-child{text-align:left;padding-left:20px;border-right:1.5px solid #CBD5E1;}
.team-table thead th:last-child{border-right:none;}
.team-table tbody tr{border-bottom:1.5px solid #CBD5E1;transition:background 0.1s;}
.team-table tbody tr:hover{background:#F8FAFC;}
.team-table tbody td{padding:11px 14px;text-align:center;color:var(--text);font-weight:600;font-size:0.88rem;border-right:1.5px solid #E2E8F0;}
.team-table tbody td:first-child{text-align:left;padding-left:20px;font-weight:700;font-size:0.88rem;color:var(--text);border-right:1.5px solid #CBD5E1;}
.team-table tbody td:last-child{border-right:none;}

/* Loading */
.loading-wrap{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.8rem;color:var(--text2);font-weight:500;}
.empty-wrap{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--text3);}
.empty-icon{font-size:2.5rem;opacity:0.3;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes pulse1{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.4);opacity:0.1;}}
</style>
</head>
<body>
<script>
(function(){
  const t=localStorage.getItem('ds_token');
  if(!t){document.documentElement.style.visibility='hidden';window.location.replace('/login.html');return;}
  const u=JSON.parse(localStorage.getItem('ds_user')||'{}');
  if(u.role!=='admin' && u.pages && !u.pages.includes('sod')){
    document.documentElement.style.visibility='hidden';
    window.location.replace('/no-access.html');
    return;
  }
  document.documentElement.style.visibility='visible';
})();

async function checkDeviceStatus(){
  try{
    const t = localStorage.getItem('ds_token');
    if(!t) return;
    const res = await fetch('/api/me', { headers: { 'authorization': t } });
    if(res.status === 401){
      const data = await res.json();
      if(data.error === 'DEVICE_RESET'){
        localStorage.removeItem('ds_token');
        localStorage.removeItem('ds_user');
        localStorage.removeItem('ds_device_token');
        alert('Your device has been reset by admin. Please login again with new device code.');
        window.location.replace('/login.html');
      }
    }
  }catch(e){ /* offline or server unreachable - skip this check */ }
}
setInterval(checkDeviceStatus, 30000);
checkDeviceStatus();
</script>

<div class="sidebar">

  return n % 1 === 0 ? n : n.toFixed(2);

function pct(val){
  if(!val&&val!==0) return '—';

function renderGeneric(data, deptName, icon){
  const rows = data.filter(r => r.some(c => c !== ''));
  let metrics = '';
  rows.forEach(row => {
    const label = String(row[0]||row[1]||'').trim();
    if(!label) return;
    let val = '';
    for(let i=1;i<row.length;i++){if(row[i]!==''){val=row[i];break;}}
    if(val !== '') metrics += mr(label, val, 'blue');
  });
  return `
    <div class="section-card">
      <div class="section-hdr">
        <div class="section-hdr-icon" style="background:rgba(37,99,235,0.1);">${icon}</div>
        <span class="section-hdr-title" style="color:#2563EB;">${deptName} — Full Detail</span>
      </div>
      ${metrics || '<div style="padding:20px;color:var(--text2);">No detailed data available</div>'}
    </div>
  `;
}

async function loadDept(sheet, deptName, icon, btnId){
  document.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+btnId);
  if(btn) btn.classList.add('active');

  document.getElementById('deptContent').innerHTML=`
    <div class="dept-hdr">
      <div class="dept-hdr-icon">${icon}</div>
      <div class="dept-hdr-info"><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Fetching live data...</div></div>
    </div>
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading ${deptName}...</div></div>`;

  if(refreshTimer) clearInterval(refreshTimer);
  let hasRendered = false;

  async function fetch_render(){
    try{
      const cacheKey=sheet;
      const now=Date.now();
      let json;

      if(dataCache[cacheKey]&&(now-dataCache[cacheKey].ts)<CACHE_TTL){
        json=dataCache[cacheKey].data;
      } else {
        const controller=new AbortController();
        const timeoutId=setTimeout(()=>controller.abort(),15000);
        try{
          const res=await fetch(SCRIPT_URL+'?sheet='+encodeURIComponent(sheet)+'&t='+now,{cache:'no-store',signal:controller.signal});
          json=await res.json();
        }finally{ clearTimeout(timeoutId); }
        if(json.success) dataCache[cacheKey]={data:json,ts:now};
      }

      if(!json||!json.success){
        if(!hasRendered) document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>Data load failed</div></div>';
        return;
      }

      const now2=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      let content='';
      if(deptName==='Organic & Pop-Up') content=renderOrganic(json.data);
      else if(deptName==='Marketing') content=renderMarketing(json.data);
      else if(deptName==='Qualifier & 4th Floor') content=renderQualifier(json.data);
      else if(deptName==='Revived Leads') content=renderRevived(json.data);
      else if(deptName==='Closed Leads') content=renderClosed(json.data);
      else content=renderGeneric(json.data,deptName,icon);

      document.getElementById('deptContent').innerHTML=`
        <div class="dept-hdr">
          <div class="dept-hdr-icon">${icon}</div>
          <div class="dept-hdr-info"><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Live data · 30s auto-refresh</div></div>
          <div class="dept-hdr-time">
            <div class="dept-hdr-time-label">LAST UPDATED</div>
            <div class="dept-hdr-time-val">${now2}</div>
          </div>
        </div>
        ${content}`;
      hasRendered = true;
    }catch(e){
      console.error(e);
      // Keep the existing dashboard on refresh failures - only show error if nothing rendered yet
      if(!hasRendered){
        document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>Connection error — retrying in 30s...</div></div>';
      }
    }
  }

  fetch_render();
  // Skip refresh while the tab is hidden (saves API quota); next visible tick refreshes
  refreshTimer=setInterval(()=>{ if(!document.hidden) fetch_render(); },30000);
}

loadDept('SOD','Organic & Pop-Up','📥','Organic');
