<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD — Start of Day Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c18;
  --bg2:#0d1425;
  --card:#0f1a2e;
  --card2:#132040;
  --border:#1a2d4a;
  --border2:#203558;
  --cyan:#00d4ff;
  --cyan2:#0099cc;
  --gold:#f5a623;
  --green:#00e5a0;
  --red:#ff4757;
  --purple:#7c4dff;
  --blue:#2979ff;
  --pink:#ff6b9d;
  --text:#e8f0fe;
  --text2:#8fa3c0;
  --dim:#3a5070;
}
html{visibility:hidden}
body{
  background:var(--bg);
  font-family:'Inter',sans-serif;
  color:var(--text);
  min-height:100vh;
  padding-top:56px;
  display:flex;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 50% 60% at 0% 0%,rgba(0,212,255,0.07) 0%,transparent 55%),
    radial-gradient(ellipse 40% 50% at 100% 100%,rgba(124,77,255,0.07) 0%,transparent 55%),
    radial-gradient(ellipse 30% 40% at 50% 50%,rgba(0,229,160,0.03) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(8,12,24,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;
  box-shadow:0 0 16px rgba(0,229,160,0.3);
}
.nav-logo-text{font-family:'DM Mono',monospace;font-size:0.9rem;letter-spacing:0.12em;font-weight:500;}
.nav-logo-text span{color:var(--green);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{
  padding:7px 16px;border-radius:8px;font-size:0.72rem;
  font-family:'DM Mono',monospace;letter-spacing:0.06em;
  text-decoration:none;color:var(--text2);
  background:transparent;border:1px solid transparent;
  transition:all 0.2s;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-link.ds{color:var(--cyan);background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.2);box-shadow:0 0 12px rgba(0,212,255,0.1);}
.nav-link.sod{color:var(--green);background:rgba(0,229,160,0.08);border-color:rgba(0,229,160,0.2);box-shadow:0 0 12px rgba(0,229,160,0.1);}
.nav-link.eod{color:var(--gold);background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.2);box-shadow:0 0 12px rgba(245,166,35,0.1);}

/* ── USER PILL ── */
.user-pill{
  display:flex;align-items:center;gap:9px;cursor:pointer;
  background:rgba(0,212,255,0.05);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:50px;padding:5px 14px 5px 5px;
  transition:all 0.2s;position:relative;
}
.user-pill:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 20px rgba(0,212,255,0.15);}
.user-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:#080c18;
  box-shadow:0 0 10px rgba(0,229,160,0.3);
}
.user-name{font-size:0.72rem;color:var(--text);font-weight:500;}
.user-desig{font-size:0.55rem;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;}
.user-menu{
  display:none;position:absolute;right:0;top:calc(100% + 10px);
  background:var(--card2);border:1px solid var(--border2);
  border-radius:14px;padding:8px;min-width:190px;
  z-index:9999;box-shadow:0 24px 60px rgba(0,0,0,0.7);
}
.menu-hdr{padding:10px 12px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.menu-name{font-size:0.78rem;color:var(--text);font-weight:500;}
.menu-desig{font-size:0.62rem;color:var(--text2);margin-top:2px;}
.logout-item{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-radius:8px;cursor:pointer;color:var(--red);font-size:0.74rem;transition:all 0.15s;
}
.logout-item:hover{background:rgba(255,71,87,0.08);}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:230px;
  background:var(--bg2);border-right:1px solid var(--border);
  z-index:100;overflow-y:auto;padding:20px 12px;
}
.sidebar-label{
  font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--dim);padding:0 8px;margin-bottom:14px;font-weight:600;
}
.dept-btn{
  width:100%;text-align:left;padding:11px 12px;
  border:1px solid transparent;
  background:transparent;border-radius:10px;
  color:var(--text2);font-family:'Inter',sans-serif;
  font-size:0.78rem;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:10px;margin-bottom:4px;
}
.dept-btn:hover{color:var(--text);background:rgba(255,255,255,0.04);border-color:var(--border);}
.dept-btn.active{
  color:var(--green);
  background:linear-gradient(135deg,rgba(0,229,160,0.1),rgba(0,212,255,0.05));
  border-color:rgba(0,229,160,0.25);
  box-shadow:0 4px 16px rgba(0,229,160,0.1);
}
.dept-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;background:rgba(255,255,255,0.05);
  flex-shrink:0;
}
.dept-btn.active .dept-icon{background:rgba(0,229,160,0.15);}
.dept-name{font-weight:500;font-size:0.76rem;}

/* ── MAIN ── */
.main{
  margin-left:230px;flex:1;
  position:relative;z-index:1;
  padding:24px;
}

/* ── PAGE HEADER ── */
.page-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.page-title{
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.page-sub{color:var(--text2);font-size:0.7rem;margin-top:3px;letter-spacing:0.04em;}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);
  border-radius:20px;padding:5px 14px;font-size:0.64rem;color:var(--green);
  letter-spacing:0.08em;font-weight:500;
  box-shadow:0 0 12px rgba(0,229,160,0.1);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s ease infinite;box-shadow:0 0 6px var(--green);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ── DEPT HEADER BAR ── */
.dept-hdr{
  display:flex;align-items:center;gap:16px;
  background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--border2);border-radius:14px;
  padding:18px 24px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.dept-hdr::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),var(--cyan),transparent);
}
.dept-hdr-icon{font-size:2rem;}
.dept-hdr-name{font-size:1.1rem;font-weight:700;color:var(--green);}
.dept-hdr-sub{font-size:0.65rem;color:var(--text2);margin-top:3px;}
.dept-hdr-time{margin-left:auto;font-size:0.62rem;color:var(--text2);font-family:'DM Mono',monospace;}
.dept-hdr-time span{color:var(--green);}

/* ── KPI CARDS ── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;margin-bottom:20px;
}
.kpi-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;padding:16px 14px;
  position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
  cursor:default;
}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(to top,rgba(255,255,255,0.02),transparent);
  pointer-events:none;
}
.kpi-card.c-green::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.kpi-card.c-cyan::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.kpi-card.c-gold::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.kpi-card.c-purple::before{background:linear-gradient(90deg,transparent,var(--purple),transparent);}
.kpi-card.c-red::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.kpi-card.c-blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.kpi-label{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:10px;font-weight:500;}
.kpi-val{font-size:2rem;font-weight:700;line-height:1;margin-bottom:6px;font-family:'DM Mono',monospace;}
.kpi-val.green{color:var(--green);text-shadow:0 0 20px rgba(0,229,160,0.3);}
.kpi-val.cyan{color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,0.3);}
.kpi-val.gold{color:var(--gold);text-shadow:0 0 20px rgba(245,166,35,0.3);}
.kpi-val.purple{color:var(--purple);text-shadow:0 0 20px rgba(124,77,255,0.3);}
.kpi-val.red{color:var(--red);text-shadow:0 0 20px rgba(255,71,87,0.3);}
.kpi-val.blue{color:var(--blue);text-shadow:0 0 20px rgba(41,121,255,0.3);}
.kpi-sub{font-size:0.6rem;color:var(--dim);}

/* ── DETAIL GRID ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.detail-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.detail-title{
  padding:13px 16px;font-size:0.65rem;letter-spacing:0.1em;
  text-transform:uppercase;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-weight:600;
}
.detail-title.green{color:var(--green);background:rgba(0,229,160,0.05);}
.detail-title.cyan{color:var(--cyan);background:rgba(0,212,255,0.05);}
.detail-title.gold{color:var(--gold);background:rgba(245,166,35,0.05);}
.detail-title.red{color:var(--red);background:rgba(255,71,87,0.05);}
.detail-title.purple{color:var(--purple);background:rgba(124,77,255,0.05);}

.mrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-bottom:1px solid rgba(26,45,74,0.5);
  transition:background 0.12s;
}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:rgba(0,229,160,0.02);}
.mrow-label{font-size:0.73rem;color:var(--text2);}
.mrow-val{font-size:0.88rem;font-weight:600;font-family:'DM Mono',monospace;}
.mrow-val.green{color:var(--green);}
.mrow-val.cyan{color:var(--cyan);}
.mrow-val.gold{color:var(--gold);}
.mrow-val.red{color:var(--red);}
.mrow-val.purple{color:var(--purple);}
.mrow-val.blue{color:var(--blue);}
.mrow-val.dim{color:var(--dim);}

.divider-label{
  padding:8px 16px;font-size:0.58rem;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--dim);border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.01);
}

/* ── LOADING ── */
.loading-wrap{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:14px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;box-shadow:0 0 12px rgba(0,229,160,0.2);}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.75rem;color:var(--text2);}

.empty-wrap{display:flex;align-items:center;justify-content:center;height:250px;flex-direction:column;gap:12px;color:var(--text2);}
.empty-icon{font-size:2.5rem;opacity:0.2;}
</style>
</head>
<body>
<script>
(function(){
  const t=localStorage.getItem('ds_token');
  if(!t){document.documentElement.style.visibility='hidden';window.location.replace('/login.html');}
  else document.documentElement.style.visibility='visible';
})();
</script>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">☀️</div>
    <div class="nav-logo-text">START OF <span>DAY</span></div>
  </div>
  <div class="nav-links">
    <a href="/index.html" class="nav-link ds">⚡ DataSearch</a>
    <a href="/sod.html" class="nav-link sod">☀️ SOD</a>
    <a href="/eod.html" class="nav-link eod">🌙 EOD</a>
  </div>
  <div style="position:relative;">
    <div class="user-pill" onclick="toggleMenu()">
      <div class="user-avatar" id="uAvatar"></div>
      <div>
        <div class="user-name" id="uName"></div>
        <div class="user-desig" id="uDesig"></div>
      </div>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3a5070" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
    <div class="user-menu" id="uMenu">
      <div class="menu-hdr">
        <div class="menu-name" id="mName"></div>
        <div class="menu-desig" id="mDesig"></div>
      </div>
      <div class="logout-item" onclick="doLogout()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </div>
    </div>
  </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-label">Departments</div>
  <button class="dept-btn active" onclick="loadDept('SOD','Organic & Pop-Up','📥','Organic')" id="btn-Organic">
    <div class="dept-icon">📥</div>
    <div class="dept-name">Organic & Pop-Up</div>
  </button>
  <button class="dept-btn" onclick="loadDept('SOD','Marketing','📢','Marketing')" id="btn-Marketing">
    <div class="dept-icon">📢</div>
    <div class="dept-name">Marketing</div>
  </button>
  <button class="dept-btn" onclick="loadDept('SOD','Qualifier & 4th Floor','🏢','Qualifier')" id="btn-Qualifier">
    <div class="dept-icon">🏢</div>
    <div class="dept-name">Qualifier & 4th Floor</div>
  </button>
  <button class="dept-btn" onclick="loadDept('SOD','Revived Leads','🔄','Revived')" id="btn-Revived">
    <div class="dept-icon">🔄</div>
    <div class="dept-name">Revived Leads</div>
  </button>
  <button class="dept-btn" onclick="loadDept('SOD','Closed Leads','✅','Closed')" id="btn-Closed">
    <div class="dept-icon">✅</div>
    <div class="dept-name">Closed Leads</div>
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="page-hdr">
    <div>
      <div class="page-title">Start of Day Report</div>
      <div class="page-sub">Live Department Intelligence · Auto-refreshes every 30 seconds</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
  </div>
  <div id="deptContent">
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading department data...</div></div>
  </div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz7DeRgHyuJNzQjFIZGbK0cA0h50RAP7wi_JPmbL2dMLDBC39Rry2tO_A0O8OBefA4o/exec';

const u=JSON.parse(localStorage.getItem('ds_user')||'{}');
document.getElementById('uAvatar').textContent=(u.name||'U').charAt(0).toUpperCase();
document.getElementById('uName').textContent=u.name||'User';
document.getElementById('uDesig').textContent=u.designation||u.role||'';
document.getElementById('mName').textContent=u.name||'User';
document.getElementById('mDesig').textContent=u.designation||'';

function toggleMenu(){const m=document.getElementById('uMenu');m.style.display=m.style.display==='block'?'none':'block';}
document.addEventListener('click',function(e){const p=document.querySelector('.user-pill');const m=document.getElementById('uMenu');if(p&&!p.contains(e.target)&&m)m.style.display='none';});
function doLogout(){const t=localStorage.getItem('ds_token');fetch('/api/logout',{method:'POST',headers:{'authorization':t}});localStorage.removeItem('ds_token');localStorage.removeItem('ds_user');window.location.replace('/login.html');}

let refreshTimer=null;

function v(val){
  if(val===0||val===''||val===null||val===undefined) return '<span class="mrow-val dim">—</span>';
  return val;
}
function pct(val){
  if(!val) return '—';
  const n=parseFloat(val);
  return n<=1&&n>0 ? Math.round(n*100)+'%' : val;
}
function mr(label,val,color='green'){
  return `<div class="mrow"><span class="mrow-label">${label}</span><span class="mrow-val ${color}">${v(val)}</span></div>`;
}
function kpi(label,val,color,sub){
  return `<div class="kpi-card c-${color}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val ${color}">${val}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

function renderOrganic(data){
  const popup_recv   = data[2]?.[2]  ?? 0;
  const popup_qual   = data[3]?.[2]  ?? 0;
  const popup_closed = data[4]?.[2]  ?? 0;
  const hot_recv     = data[8]?.[2]  ?? 0;
  const hot_qual     = data[9]?.[2]  ?? 0;
  const hot_closed   = data[10]?.[2] ?? 0;

  const popup_recv_overall = data[2]?.[5] ?? 0;
  const popup_recv_monthly = data[3]?.[5] ?? 0;
  const popup_recv_today   = data[4]?.[5] ?? 0;
  const hot_recv_overall   = data[2]?.[8] ?? 0;
  const hot_recv_monthly   = data[3]?.[8] ?? 0;
  const hot_recv_today     = data[4]?.[8] ?? 0;

  const popup_qual_overall = data[8]?.[5]  ?? 0;
  const popup_qual_monthly = data[9]?.[5]  ?? 0;
  const popup_qual_today   = data[10]?.[5] ?? 0;
  const hot_qual_overall   = data[8]?.[8]  ?? 0;
  const hot_qual_monthly   = data[9]?.[8]  ?? 0;
  const hot_qual_today     = data[10]?.[8] ?? 0;

  const total_popup_recv   = data[16]?.[2] ?? 0;
  const valid_popups       = data[17]?.[2] ?? 0;
  const repeated           = data[18]?.[2] ?? 0;
  const invalid            = data[19]?.[2] ?? 0;
  const total_closed       = data[16]?.[5] ?? 0;
  const last3months        = data[17]?.[5] ?? 0;
  const current_month      = data[18]?.[5] ?? 0;
  const today_closed       = data[19]?.[5] ?? 0;

  return `
    <div class="kpi-grid">
      ${kpi('POP-UP Received Today', popup_recv, 'green', 'Unique POP-UPs')}
      ${kpi('POP-UP Qualified Today', popup_qual, 'cyan', 'Unique POP-UPs')}
      ${kpi('POP-UP Closed Today', popup_closed, 'gold', 'Closed Today')}
      ${kpi('Hot Leads Received Today', hot_recv, 'purple', 'Unique Hot Leads')}
      ${kpi('Hot Leads Qualified Today', hot_qual, 'red', 'Qualified Today')}
      ${kpi('Hot Leads Closed Today', hot_closed, 'blue', 'Closed Today')}
    </div>

    <div style="margin-bottom:14px;">
      <div class="detail-card">
        <div class="detail-title green">📋 Today Received POP-UPS Breakdown</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;">
          <div style="padding:18px 20px;border-right:1px solid var(--border);text-align:center;">
            <div style="font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-weight:500;">Total Received</div>
            <div style="font-size:1.8rem;font-weight:700;color:var(--green);font-family:'DM Mono',monospace;">${total_popup_recv}</div>
          </div>
          <div style="padding:18px 20px;border-right:1px solid var(--border);text-align:center;">

function renderGeneric(data, deptName, icon){
  const rows=data.filter(r=>r.some(c=>c!==''));
  let cards=''; let metrics=''; let cardCount=0;
  const colors=['green','cyan','gold','purple','red','blue'];
  rows.forEach(row=>{
    const label=String(row[0]||row[1]||'').trim();
    if(!label) return;
    let val='';
    for(let i=1;i<row.length;i++){if(row[i]!==''){val=row[i];break;}}
    if(val!==''&&cardCount<6){
      cards+=kpi(label,val,colors[cardCount%colors.length],'');
      cardCount++;
    }
    if(val!=='') metrics+=mr(label,val,'green');
  });
  return `
    <div class="kpi-grid">${cards||'<div style="color:var(--text2);padding:20px;grid-column:span 6;">No data available yet</div>'}</div>
    <div class="detail-card" style="margin-bottom:20px;">
      <div class="detail-title green">${icon} ${deptName} — Full Detail</div>
      ${metrics||'<div style="padding:20px;color:var(--text2);">No detailed data</div>'}
    </div>
  `;
}

async function loadDept(sheet, deptName, icon, btnId){
  document.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+btnId);
  if(btn) btn.classList.add('active');

  document.getElementById('deptContent').innerHTML=`
    <div class="dept-hdr">
      <div class="dept-hdr-icon">${icon}</div>
      <div><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Fetching live data...</div></div>
    </div>
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading ${deptName}...</div></div>`;

  if(refreshTimer) clearInterval(refreshTimer);

  async function fetch_render(){
    try{
      const res=await fetch(SCRIPT_URL+'?sheet='+encodeURIComponent(sheet));
      const json=await res.json();
      if(!json.success){
        document.getElementById('deptContent').innerHTML=`<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>${json.error||'Sheet not found'}</div></div>`;
        return;
      }
      const now=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      let content='';
      if(deptName==='Organic & Pop-Up') content=renderOrganic(json.data);
      else if(deptName==='Marketing') content=renderMarketing(json.data);
      else content=renderGeneric(json.data,deptName,icon);

      document.getElementById('deptContent').innerHTML=`
        <div class="dept-hdr">
          <div class="dept-hdr-icon">${icon}</div>
          <div><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Live data · 30s auto-refresh</div></div>
          <div class="dept-hdr-time">Updated: <span>${now}</span></div>
        </div>
        ${content}`;
    }catch(e){console.error(e);}
  }

  fetch_render();
  refreshTimer=setInterval(fetch_render,30000);
}

loadDept('SOD','Organic & Pop-Up','📥','Organic');
