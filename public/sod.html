<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD — Start of Day Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --sidebar:#0f1520;
  --nav:#0a0f1a;
  --card:#ffffff;
  --card-tint:#f0f7ff;
  --border:#e2e8f0;
  --border-dark:#1e2d45;
  --cyan:#00b4d8;
  --cyan2:#0077a8;
  --gold:#f5a623;
  --green:#00b894;
  --green2:#00856e;
  --red:#e53e3e;
  --purple:#6c63ff;
  --blue:#3182ce;
  --pink:#d63384;
  --orange:#dd6b20;
  --text-dark:#1a202c;
  --text-mid:#4a5568;
  --text-light:#718096;
  --text-white:#f7fafc;
  --text-sidebar:#8899bb;
}
html{visibility:hidden}
body{
  background:var(--bg);
  font-family:'Inter',sans-serif;
  color:var(--text-dark);
  min-height:100vh;
  padding-top:60px;
  display:flex;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--nav);
  border-bottom:1px solid rgba(255,255,255,0.06);
  height:60px;display:flex;align-items:center;
  padding:0 28px;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,#ffd600,#ff8c00);
  border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;
  box-shadow:0 4px 14px rgba(255,160,0,0.35);
}
.nav-logo-text{
  font-size:0.95rem;font-weight:800;
  letter-spacing:0.06em;color:#fff;
}
.nav-logo-text span{color:#ffd600;}

.nav-links{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:5px;
}
.nav-link{
  padding:7px 22px;border-radius:10px;font-size:0.76rem;
  font-weight:600;letter-spacing:0.03em;
  text-decoration:none;color:rgba(255,255,255,0.5);
  background:transparent;border:none;
  transition:all 0.2s;display:flex;align-items:center;gap:7px;
  cursor:pointer;
}
.nav-link:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.06);}
.nav-link.ds{
  color:#fff;
  background:linear-gradient(135deg,#1a56db,#06b6d4);
  box-shadow:0 4px 14px rgba(6,182,212,0.35);
}
.nav-link.sod{
  color:#1a1a1a;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  box-shadow:0 4px 14px rgba(245,158,11,0.35);
}
.nav-link.eod{
  color:#fff;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  box-shadow:0 4px 14px rgba(124,58,237,0.35);
}

/* ── USER PILL ── */
.user-pill{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50px;padding:6px 14px 6px 6px;
  transition:all 0.2s;position:relative;
}
.user-pill:hover{background:rgba(255,255,255,0.12);}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#6c63ff,#00b4d8);
  display:flex;align-items:center;justify-content:center;
  font-size:0.82rem;font-weight:800;color:#fff;
  box-shadow:0 0 10px rgba(108,99,255,0.4);
}
.user-name{font-size:0.76rem;color:#fff;font-weight:700;}
.user-desig{font-size:0.58rem;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;}
.user-menu{
  display:none;position:absolute;right:0;top:calc(100% + 10px);
  background:#1a2235;border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:8px;min-width:190px;
  z-index:9999;box-shadow:0 24px 60px rgba(0,0,0,0.7);
}
.menu-hdr{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:6px;}
.menu-name{font-size:0.78rem;color:#fff;font-weight:700;}
.menu-desig{font-size:0.62rem;color:rgba(255,255,255,0.4);margin-top:2px;}
.logout-item{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-radius:8px;cursor:pointer;color:#fc8181;font-size:0.74rem;transition:all 0.15s;
}
.logout-item:hover{background:rgba(252,129,129,0.1);}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:60px;left:0;bottom:0;width:230px;
  background:var(--sidebar);
  border-right:1px solid rgba(255,255,255,0.06);
  z-index:100;overflow-y:auto;padding:24px 12px;
}
.sidebar-label{
  font-size:0.62rem;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);
  padding:0 10px;margin-bottom:16px;
}
.dept-btn{
  width:100%;text-align:left;padding:12px 14px;
  border:1px solid transparent;
  background:transparent;border-radius:12px;
  color:var(--text-sidebar);
  font-family:'Inter',sans-serif;
  font-size:0.8rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:12px;margin-bottom:6px;
}
.dept-btn:hover{
  color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.04);
  border-color:rgba(255,255,255,0.08);
}
.dept-btn.active{
  color:#fff;font-weight:700;
  background:rgba(0,180,216,0.12);
  border-color:rgba(0,180,216,0.25);
  border-left:3px solid var(--cyan);
}
.dept-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  background:rgba(255,255,255,0.05);
  flex-shrink:0;transition:all 0.2s;
}
.dept-btn.active .dept-icon{
  background:rgba(0,180,216,0.15);
}
.dept-name{font-size:0.8rem;}

/* ── MAIN ── */
.main{
  margin-left:230px;flex:1;
  padding:28px 32px;
  background:var(--bg);
  min-height:calc(100vh - 60px);
}

/* ── PAGE HEADER ── */
.page-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:12px;
}
.page-title{
  font-size:1.8rem;font-weight:800;
  color:#fff;letter-spacing:-0.02em;
}
.page-sub{color:rgba(255,255,255,0.4);font-size:0.72rem;margin-top:4px;font-weight:400;}
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,184,148,0.1);
  border:1.5px solid rgba(0,184,148,0.3);
  border-radius:20px;padding:7px 18px;
  font-size:0.7rem;color:var(--green);
  letter-spacing:0.1em;font-weight:700;
  box-shadow:0 0 16px rgba(0,184,148,0.1);
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  animation:blink 1.5s ease infinite;
  box-shadow:0 0 8px var(--green);
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ── DEPT HEADER ── */
.dept-hdr{
  background: rgb(63,94,251);
  background: linear-gradient(211deg, rgba(63,94,251,1) 25%, rgba(252,70,107,1) 61%);
  border-radius:14px;padding:14px 22px;margin-bottom:24px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 6px 24px rgba(63,94,251,0.3);
  position:relative;overflow:hidden;
}
.dept-hdr::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,200,255,0.15),transparent 50%,rgba(124,77,255,0.15));
}
.dept-hdr-icon{font-size:2rem;filter:drop-shadow(0 0 12px rgba(255,255,255,0.3));position:relative;z-index:1;}
.dept-hdr-name{font-size:1.4rem;font-weight:800;color:#fff;position:relative;z-index:1;}
.dept-hdr-sub{font-size:0.68rem;color:rgba(255,255,255,0.6);margin-top:4px;position:relative;z-index:1;}
.dept-hdr-time{margin-left:auto;font-size:0.78rem;color:#fff;font-family:'DM Mono',monospace;position:relative;z-index:1;font-weight:600;text-align:right;}
.dept-hdr-time span{color:#fff;font-weight:800;font-size:0.9rem;display:block;margin-top:2px;}

/* ── KPI CARDS - WHITE cards like reference ── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:14px;margin-bottom:20px;
}
.kpi-card{
  background:#fff;
  border:1px solid #e8edf5;
  border-radius:14px;padding:18px 16px;
  position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
  cursor:default;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.12);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.kpi-card.c-green::before{background:linear-gradient(90deg,#00b894,#00cec9);}
.kpi-card.c-cyan::before{background:linear-gradient(90deg,#00b4d8,#0077b6);}
.kpi-card.c-gold::before{background:linear-gradient(90deg,#f5a623,#fdcb6e);}
.kpi-card.c-purple::before{background:linear-gradient(90deg,#6c63ff,#a29bfe);}
.kpi-card.c-red::before{background:linear-gradient(90deg,#e53e3e,#fc8181);}
.kpi-card.c-blue::before{background:linear-gradient(90deg,#3182ce,#63b3ed);}
.kpi-card.c-pink::before{background:linear-gradient(90deg,#d63384,#f472b6);}
.kpi-card.c-orange::before{background:linear-gradient(90deg,#dd6b20,#f6ad55);}
.kpi-label{
  font-size:0.62rem;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:#718096;margin-bottom:12px;
}
.kpi-val{
  font-size:2.2rem;font-weight:800;line-height:1;
  margin-bottom:6px;font-family:'DM Mono',monospace;
  letter-spacing:-0.02em;
}
.kpi-val.green{color:#00b894;}
.kpi-val.cyan{color:#00b4d8;}
.kpi-val.gold{color:#f5a623;}
.kpi-val.purple{color:#6c63ff;}
.kpi-val.red{color:#e53e3e;}
.kpi-val.blue{color:#3182ce;}
.kpi-val.pink{color:#d63384;}
.kpi-val.orange{color:#dd6b20;}
.kpi-sub{font-size:0.64rem;color:#a0aec0;font-weight:500;}

/* ── DETAIL CARDS - Light tinted like reference ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-card{
  background:#fff;
  border:1px solid #e8edf5;
  border-radius:14px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.detail-title{
  padding:14px 18px;font-size:0.68rem;letter-spacing:0.1em;
  text-transform:uppercase;border-bottom:1px solid #edf2f7;
  display:flex;align-items:center;gap:8px;font-weight:700;
}
.detail-title.green{color:#00856e;background:rgba(0,184,148,0.06);}
.detail-title.cyan{color:#0077a8;background:rgba(0,180,216,0.06);}
.detail-title.gold{color:#b7791f;background:rgba(245,166,35,0.06);}
.detail-title.red{color:#c53030;background:rgba(229,62,62,0.06);}
.detail-title.purple{color:#553c9a;background:rgba(108,99,255,0.06);}
.detail-title.blue{color:#2c5282;background:rgba(49,130,206,0.06);}

.mrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;
  border-bottom:1px solid #f7fafc;
  transition:background 0.12s;
}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:#f7fafc;}
.mrow-label{font-size:0.76rem;color:#4a5568;font-weight:500;}
.mrow-val{font-size:0.92rem;font-weight:700;font-family:'DM Mono',monospace;}
.mrow-val.green{color:#00b894;}
.mrow-val.cyan{color:#00b4d8;}
.mrow-val.gold{color:#f5a623;}
.mrow-val.red{color:#e53e3e;}
.mrow-val.purple{color:#6c63ff;}
.mrow-val.blue{color:#3182ce;}
.mrow-val.dim{color:#cbd5e0;}
.mrow-val.text{color:#2d3748;}

.divider-label{
  padding:8px 18px;font-size:0.6rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:#718096;border-bottom:1px solid #edf2f7;
  background:#f8fafc;font-weight:700;
}

/* ── LOADING ── */
.loading-wrap{
  display:flex;align-items:center;justify-content:center;
  height:300px;flex-direction:column;gap:14px;
}
.spinner{
  width:32px;height:32px;
  border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--cyan);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.78rem;color:rgba(255,255,255,0.4);font-weight:500;}
.empty-wrap{
  display:flex;align-items:center;justify-content:center;
  height:250px;flex-direction:column;gap:12px;
  color:rgba(255,255,255,0.3);
}
.empty-icon{font-size:2.5rem;opacity:0.2;}
</style>
</head>
<body>

(function(){
  const t=localStorage.getItem('ds_token');
  if(!t){document.documentElement.style.visibility='hidden';window.location.replace('/login.html');}

})();
</script>

<!-- NAV -->

  <div class="nav-logo">

<div class="sidebar">
  <div class="sidebar-label">Departments</div>
  <button class="dept-btn active" onclick="loadDept('SOD','Organic & Pop-Up','📥','Organic')" id="btn-Organic">

<div class="main">
  <div class="page-hdr">
    <div>
      <div class="page-title">Start of Day Report</div>
      <div class="page-sub">Live Department Intelligence · Auto-refreshes every 30 seconds</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz7DeRgHyuJNzQjFIZGbK0cA0h50RAP7wi_JPmbL2dMLDBC39Rry2tO_A0O8OBefA4o/exec';

const u=JSON.parse(localStorage.getItem('ds_user')||'{}');
document.getElementById('uAvatar').textContent=(u.name||'U').charAt(0).toUpperCase();
document.getElementById('uName').textContent=u.name||'User';
document.getElementById('uDesig').textContent=u.designation||u.role||'';
document.getElementById('mName').textContent=u.name||'User';
document.getElementById('mDesig').textContent=u.designation||'';

function toggleMenu(){const m=document.getElementById('uMenu');m.style.display=m.style.display==='block'?'none':'block';}
document.addEventListener('click',function(e){const p=document.querySelector('.user-pill');const m=document.getElementById('uMenu');if(p&&!p.contains(e.target)&&m)m.style.display='none';});
function doLogout(){const t=localStorage.getItem('ds_token');fetch('/api/logout',{method:'POST',headers:{'authorization':t}});localStorage.removeItem('ds_token');localStorage.removeItem('ds_user');window.location.replace('/login.html');}

let refreshTimer=null;
const dataCache = {};
const CACHE_TTL = 30000;

function v(val){
  if(val===0||val===''||val===null||val===undefined) return '<span class="mrow-val dim">—</span>';
  return val;
}
function pct(val){
  if(!val) return '—';
  const n=parseFloat(val);
  return n<=1&&n>0 ? Math.round(n*100)+'%' : val;
}
function mr(label,val,color='green'){
  return `<div class="mrow"><span class="mrow-label">${label}</span><span class="mrow-val ${color}">${v(val)}</span></div>`;
}
function kpi(label,val,color,sub){
  return `<div class="kpi-card c-${color}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val ${color}">${val}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

function renderOrganic(data){
  const popup_recv   = data[2]?.[2]  ?? 0;
  const popup_qual   = data[3]?.[2]  ?? 0;
  const popup_closed = data[4]?.[2]  ?? 0;
  const hot_recv     = data[8]?.[2]  ?? 0;
  const hot_qual     = data[9]?.[2]  ?? 0;
  const hot_closed   = data[10]?.[2] ?? 0;

  const popup_recv_overall = data[2]?.[5] ?? 0;
  const popup_recv_monthly = data[3]?.[5] ?? 0;
  const popup_recv_today   = data[4]?.[5] ?? 0;
  const hot_recv_overall   = data[2]?.[8] ?? 0;
  const hot_recv_monthly   = data[3]?.[8] ?? 0;
  const hot_recv_today     = data[4]?.[8] ?? 0;

  const popup_qual_overall = data[8]?.[5]  ?? 0;
  const popup_qual_monthly = data[9]?.[5]  ?? 0;
  const popup_qual_today   = data[10]?.[5] ?? 0;
  const hot_qual_overall   = data[8]?.[8]  ?? 0;
  const hot_qual_monthly   = data[9]?.[8]  ?? 0;
  const hot_qual_today     = data[10]?.[8] ?? 0;

  const total_popup_recv   = data[16]?.[2] ?? 0;
  const valid_popups       = data[17]?.[2] ?? 0;
  const repeated           = data[18]?.[2] ?? 0;
  const invalid            = data[19]?.[2] ?? 0;
  const total_closed       = data[16]?.[5] ?? 0;
  const last3months        = data[17]?.[5] ?? 0;
  const current_month      = data[18]?.[5] ?? 0;
  const today_closed       = data[19]?.[5] ?? 0;

  return `
    <div class="kpi-grid">
      ${kpi('POP-UP Received Today', popup_recv, 'green', 'Unique POP-UPs')}
      ${kpi('POP-UP Qualified Today', popup_qual, 'cyan', 'Unique POP-UPs')}
      ${kpi('POP-UP Closed Today', popup_closed, 'gold', 'Closed Today')}
      ${kpi('Hot Leads Received Today', hot_recv, 'purple', 'Unique Hot Leads')}
      ${kpi('Hot Leads Qualified Today', hot_qual, 'red', 'Qualified Today')}
      ${kpi('Hot Leads Closed Today', hot_closed, 'blue', 'Closed Today')}
    </div>

    <div style="margin-bottom:14px;">
      <div class="detail-card">
        <div class="detail-title green">📋 Today Received POP-UPS Breakdown</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;">
          <div style="padding:18px 20px;border-right:1px solid var(--border);text-align:center;">

          </thead>
          <tbody>
            ${members.map(r => `
            <tr style="border-bottom:1px solid rgba(26,45,74,0.5);transition:background 0.12s;" onmouseover="this.style.background='rgba(0,229,160,0.02)'" onmouseout="this.style.background='transparent'">
              <td style="padding:10px 16px;font-size:0.78rem;color:var(--text);font-weight:500;">${r[1]||'—'}</td>
              <td style="padding:10px 8px;text-align:center;font-size:0.78rem;color:var(--green);font-family:'DM Mono',monospace;">${r[2]||'—'}</td>
              <td style="padding:10px 8px;text-align:center;font-size:0.78rem;color:var(--cyan);font-family:'DM Mono',monospace;">${r[3]||'—'}</td>
              <td style="padding:10px 8px;text-align:center;font-size:0.78rem;color:var(--purple);font-family:'DM Mono',monospace;">${r[4]||'—'}</td>
              <td style="padding:10px 8px;text-align:center;font-size:0.78rem;color:var(--gold);font-family:'DM Mono',monospace;">${r[5]||'—'}</td>
              <td style="padding:10px 8px;text-align:center;font-size:0.9rem;font-weight:700;color:var(--${color});font-family:'DM Mono',monospace;">${r[6]||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  return `
    <div style="display:flex;flex-direction:column;gap:14px;">
      ${sectionCard('Closed Lead (Closers)', 'cyan', cl_today, cl_email, cl_st, cl_whatsapp, cl_avg_overall, cl_avg_month, cl_avg_today, cl_email_ov, cl_st_ov, cl_wa_ov, cl_uniq_ov, cl_rev_ov)}
      ${sectionCard('Closed Lead (Managers)', 'gold', mg_today, mg_email, mg_st, mg_whatsapp, mg_avg_overall, mg_avg_month, mg_avg_today, mg_email_ov, mg_st_ov, mg_wa_ov, mg_uniq_ov, mg_rev_ov)}
      ${teamTable('Team Maheen', 'cyan', maheen_cl)}
      ${teamTable('Team Khurram', 'gold', khurram_cl)}
    </div>
  `;
}

function renderGeneric(data, deptName, icon){
  const rows=data.filter(r=>r.some(c=>c!==''));
  let cards=''; let metrics=''; let cardCount=0;
  const colors=['green','cyan','gold','purple','red','blue'];
  rows.forEach(row=>{
    const label=String(row[0]||row[1]||'').trim();
    if(!label) return;
    let val='';
    for(let i=1;i<row.length;i++){if(row[i]!==''){val=row[i];break;}}
    if(val!==''&&cardCount<6){
      cards+=kpi(label,val,colors[cardCount%colors.length],'');
      cardCount++;
    }
    if(val!=='') metrics+=mr(label,val,'green');
  });
  return `
    <div class="kpi-grid">${cards||'<div style="color:var(--text2);padding:20px;grid-column:span 6;">No data available yet</div>'}</div>
    <div class="detail-card" style="margin-bottom:20px;">
      <div class="detail-title green">${icon} ${deptName} — Full Detail</div>
      ${metrics||'<div style="padding:20px;color:var(--text2);">No detailed data</div>'}
    </div>
  `;
}

async function loadDept(sheet, deptName, icon, btnId){
  document.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+btnId);
  if(btn) btn.classList.add('active');

  document.getElementById('deptContent').innerHTML=`
    <div class="dept-hdr">
      <div class="dept-hdr-icon">${icon}</div>
      <div><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Fetching live data...</div></div>
    </div>
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading ${deptName}...</div></div>`;

  if(refreshTimer) clearInterval(refreshTimer);

  async function fetch_render(){
    try{
      const cacheKey = sheet;
      const now = Date.now();
      let json;

      if(dataCache[cacheKey] && (now - dataCache[cacheKey].ts) < CACHE_TTL){
        json = dataCache[cacheKey].data;
      } else {
        const res = await fetch(SCRIPT_URL+'?sheet='+encodeURIComponent(sheet));
        json = await res.json();
        if(json.success) dataCache[cacheKey] = { data: json, ts: now };
      }

      if(!json || !json.success){
        document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>Data load failed</div></div>';
        return;
      }

      const now2=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      let content='';
      if(deptName==='Organic & Pop-Up') content=renderOrganic(json.data);
      else if(deptName==='Marketing') content=renderMarketing(json.data);
      else if(deptName==='Qualifier & 4th Floor') content=renderQualifier(json.data);
      else if(deptName==='Revived Leads') content=renderRevived(json.data);
      else if(deptName==='Closed Leads') content=renderClosed(json.data);
      else content=renderGeneric(json.data,deptName,icon);

      document.getElementById('deptContent').innerHTML=`
        <div class="dept-hdr">
          <div class="dept-hdr-icon">${icon}</div>
          <div><div class="dept-hdr-name">${deptName}</div><div class="dept-hdr-sub">Live data · 30s auto-refresh</div></div>
          <div class="dept-hdr-time">Updated: <span>${now2}</span></div>
        </div>
        ${content}`;
    }catch(e){
      console.error(e);
      document.getElementById('deptContent').innerHTML='<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>Connection error — retrying...</div></div>';
    }
  }

  fetch_render();
  refreshTimer=setInterval(fetch_render,30000);
}

loadDept('SOD','Organic & Pop-Up','📥','Organic');
</script>
