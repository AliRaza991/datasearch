<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Massive Dynamics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{visibility:hidden;}
body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);min-height:100vh;color:#0F172A;}

/* NAVBAR */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid #CBD5E1;height:80px;
  display:flex;align-items:center;padding:0 32px;
  justify-content:space-between;box-shadow:0 4px 24px rgba(0,0,0,0.04);
}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-brand-icon{width:42px;height:42px;background:linear-gradient(135deg,#2563EB,#DC2626);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 6px 20px rgba(37,99,235,0.3);}
.nav-brand-text{font-size:1.15rem;font-weight:800;}
.nav-brand-text .massive{color:#2563EB;}
.nav-brand-text .dynamics{color:#DC2626;}
.nav-pills{display:flex;align-items:center;gap:4px;background:#F1F5F9;border-radius:999px;padding:5px;border:1px solid #CBD5E1;}
.nav-pill{padding:8px 20px;border-radius:999px;font-size:0.78rem;font-weight:600;text-decoration:none;color:#64748B;background:transparent;border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.nav-pill:hover{color:#0F172A;background:rgba(255,255,255,0.8);}
.nav-pill.active{color:#fff;background:linear-gradient(135deg,#2563EB,#DC2626);box-shadow:0 4px 16px rgba(37,99,235,0.35);}
.nav-user{display:flex;align-items:center;gap:10px;cursor:pointer;position:relative;background:rgba(255,255,255,0.8);border:1px solid #CBD5E1;border-radius:999px;padding:6px 16px 6px 6px;transition:all 0.2s;}
.nav-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#DC2626);display:flex;align-items:center;justify-content:center;font-size:0.88rem;font-weight:800;color:#fff;border:2px solid #FBBF24;}
.nav-user-name{font-size:0.78rem;font-weight:700;color:#0F172A;}
.nav-user-role{font-size:0.6rem;color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;}
.user-menu{display:none;position:absolute;right:0;top:calc(100% + 10px);background:#fff;border:1px solid #CBD5E1;border-radius:14px;padding:8px;min-width:190px;z-index:9999;box-shadow:0 20px 50px rgba(0,0,0,0.1);}
.user-menu.show{display:block;}
.menu-hdr{padding:10px 12px;border-bottom:1px solid #f1f5f9;margin-bottom:6px;}
.menu-name{font-size:0.82rem;font-weight:700;}
.menu-desig{font-size:0.65rem;color:#94A3B8;margin-top:2px;}
.logout-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#ef4444;font-size:0.74rem;font-weight:600;transition:all 0.15s;}
.logout-item:hover{background:#fef2f2;}

/* MAIN */
main{padding:100px 32px 40px;max-width:1200px;margin:0 auto;}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
.page-title{font-family:'Manrope',sans-serif;font-size:2rem;font-weight:700;color:#0F172A;letter-spacing:-0.02em;}
.page-title span{color:#DC2626;}
.page-sub{color:#64748B;font-size:0.78rem;margin-top:4px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.stat-card.c1::before{background:linear-gradient(90deg,#2563EB,#60A5FA);}
.stat-card.c2::before{background:linear-gradient(90deg,#16A34A,#4ADE80);}
.stat-card.c3::before{background:linear-gradient(90deg,#DC2626,#F87171);}
.stat-card.c4::before{background:linear-gradient(90deg,#FBBF24,#FDE68A);}
.stat-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#64748B;margin-bottom:8px;}
.stat-val{font-size:2rem;font-weight:800;font-family:'Manrope',sans-serif;letter-spacing:-0.03em;}

/* ADD USER CARD */
.add-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:20px;padding:28px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
.add-card-title{font-size:0.9rem;font-weight:700;color:#0F172A;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.add-card-title .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#DC2626);}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:0.68rem;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:0.08em;}
.form-input{padding:10px 14px;border:1.5px solid #CBD5E1;border-radius:10px;font-size:0.85rem;color:#0F172A;font-family:'Inter',sans-serif;outline:none;transition:all 0.2s;background:#fff;}
.form-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.form-select{padding:10px 14px;border:1.5px solid #CBD5E1;border-radius:10px;font-size:0.85rem;color:#0F172A;outline:none;transition:all 0.2s;background:#fff;cursor:pointer;}
.form-select:focus{border-color:#2563EB;}
.add-btn{padding:10px 24px;background:linear-gradient(135deg,#2563EB,#DC2626);color:#fff;border:none;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(37,99,235,0.3);display:flex;align-items:center;gap:8px;}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,0.4);}

/* USERS TABLE */
.table-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
.table-hdr{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #E2E8F0;}
.table-hdr-title{font-size:0.9rem;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:8px;}
.search-input{padding:8px 14px;border:1.5px solid #CBD5E1;border-radius:10px;font-size:0.78rem;outline:none;transition:all 0.2s;width:220px;}
.search-input:focus{border-color:#2563EB;}

table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead th{padding:11px 16px;text-align:left;font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;background:#F8FAFC;border-bottom:1.5px solid #E2E8F0;}
tbody tr{border-bottom:1px solid #F1F5F9;transition:background 0.1s;}
tbody tr:hover{background:#F8FAFC;}
tbody td{padding:14px 16px;color:#0F172A;font-weight:500;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;}
.badge-admin{background:rgba(37,99,235,0.1);color:#1d4ed8;border:1px solid rgba(37,99,235,0.2);}
.badge-user{background:rgba(100,116,139,0.1);color:#475569;border:1px solid rgba(100,116,139,0.2);}
.badge-active{background:rgba(22,163,74,0.1);color:#15803d;border:1px solid rgba(22,163,74,0.2);}
.badge-inactive{background:rgba(220,38,38,0.08);color:#b91c1c;border:1px solid rgba(220,38,38,0.15);}
.badge-device{background:rgba(251,191,36,0.1);color:#92400e;border:1px solid rgba(251,191,36,0.3);}
.badge-nodevice{background:rgba(100,116,139,0.08);color:#64748B;border:1px solid rgba(100,116,139,0.15);}

.action-btn{padding:5px 10px;border:none;border-radius:7px;font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px;}
.btn-edit{background:rgba(37,99,235,0.1);color:#1d4ed8;}
.btn-edit:hover{background:#2563EB;color:#fff;}
.btn-device{background:rgba(251,191,36,0.15);color:#92400e;}
.btn-device:hover{background:#FBBF24;color:#000;}
.btn-reset{background:rgba(100,116,139,0.1);color:#475569;}
.btn-reset:hover{background:#64748B;color:#fff;}
.btn-toggle-on{background:rgba(220,38,38,0.1);color:#b91c1c;}
.btn-toggle-on:hover{background:#DC2626;color:#fff;}
.btn-toggle-off{background:rgba(22,163,74,0.1);color:#15803d;}
.btn-toggle-off:hover{background:#16A34A;color:#fff;}
.btn-delete{background:rgba(220,38,38,0.08);color:#b91c1c;}
.btn-delete:hover{background:#DC2626;color:#fff;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,0.2);}
.modal-title{font-family:'Manrope',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.modal-btns{display:flex;gap:10px;margin-top:24px;}
.modal-save{flex:1;padding:11px;background:linear-gradient(135deg,#2563EB,#DC2626);color:#fff;border:none;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;}
.modal-cancel{flex:1;padding:11px;background:#F1F5F9;color:#64748B;border:none;border-radius:10px;font-size:0.82rem;font-weight:600;cursor:pointer;}

/* LOADING */
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px;}
.spinner{width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.user-avatar-cell{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563EB,#DC2626);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:#fff;flex-shrink:0;}
.user-cell{display:flex;align-items:center;gap:10px;}
.user-cell-name{font-weight:700;font-size:0.84rem;}
.username-code{background:#F1F5F9;padding:3px 8px;border-radius:6px;font-size:0.76rem;color:#0F172A;font-family:'DM Mono',monospace;}
.actions-cell{display:flex;gap:5px;flex-wrap:wrap;}
</style>
</head>
<body>
<script>
(function(){
  const t=localStorage.getItem('ds_token');
  if(!t){document.documentElement.style.visibility='hidden';window.location.replace('/login.html');}
  else document.documentElement.style.visibility='visible';
})();
</script>

<!-- NAVBAR -->
<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">M</div>
    <div class="nav-brand-text"><span class="massive">Massive </span><span class="dynamics">Dynamics</span></div>
  </div>
  <div class="nav-pills">
    <a href="/index.html" class="nav-pill">⚡ DataSearch</a>
    <a href="/sod.html" class="nav-pill">☀️ SOD</a>
    <a href="/eod.html" class="nav-pill">🌙 EOD</a>
    <a href="/admin.html" class="nav-pill active">⚙️ Admin</a>
  </div>
  <div class="nav-user" onclick="toggleMenu()">
    <div class="nav-avatar" id="uAvatar"></div>
    <div><div class="nav-user-name" id="uName"></div><div class="nav-user-role">Administrator</div></div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    <div class="user-menu" id="uMenu">
      <div class="menu-hdr"><div class="menu-name" id="mName"></div><div class="menu-desig">Admin Panel</div></div>
      <div class="logout-item" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </div>
    </div>
  </div>
</nav>

<main>
  <!-- PAGE HEADER -->
  <div class="page-hdr">
    <div>
      <div class="page-title">User <span>Management</span></div>
      <div class="page-sub">Manage users, roles, and device authentication</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card c1"><div class="stat-label">Total Users</div><div class="stat-val" style="color:#2563EB;" id="statTotal">—</div></div>
    <div class="stat-card c2"><div class="stat-label">Active Users</div><div class="stat-val" style="color:#16A34A;" id="statActive">—</div></div>
    <div class="stat-card c3"><div class="stat-label">Inactive Users</div><div class="stat-val" style="color:#DC2626;" id="statInactive">—</div></div>
    <div class="stat-card c4"><div class="stat-label">Registered Devices</div><div class="stat-val" style="color:#D97706;" id="statDevices">—</div></div>
  </div>

  <!-- ADD USER -->
  <div class="add-card">
    <div class="add-card-title"><div class="dot"></div> Add New User</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="newName" class="form-input" placeholder="John Doe"></div>
      <div class="form-group"><label class="form-label">Username</label><input type="text" id="newUsername" class="form-input" placeholder="johndoe"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" id="newPassword" class="form-input" placeholder="••••••••"></div>
      <div class="form-group"><label class="form-label">Designation</label><input type="text" id="newDesignation" class="form-input" placeholder="Lead Qualifier"></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select id="newRole" class="form-select">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <button type="button" class="add-btn" onclick="addUser()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Add User
    </button>
  </div>

  <!-- USERS TABLE -->
  <div class="table-card">
    <div class="table-hdr">
      <div class="table-hdr-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        All Users
      </div>
      <input type="text" class="search-input" placeholder="🔍 Search users..." onkeyup="filterUsers(this.value)">
    </div>
    <div id="usersContainer">
      <div class="loading-wrap"><div class="spinner"></div><div style="font-size:0.78rem;color:#64748B;">Loading users...</div></div>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      Edit User
    </div>
    <input type="hidden" id="editId">
    <div class="form-row" style="grid-template-columns:1fr 1fr;">
      <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="editName" class="form-input"></div>
      <div class="form-group"><label class="form-label">Username</label><input type="text" id="editUsername" class="form-input"></div>
      <div class="form-group"><label class="form-label">New Password</label><input type="password" id="editPassword" class="form-input" placeholder="Leave blank to keep"></div>
      <div class="form-group"><label class="form-label">Designation</label><input type="text" id="editDesignation" class="form-input"></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select id="editRole" class="form-select"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
    </div>
    <div class="modal-btns">
      <button type="button" class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button type="button" class="modal-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('ds_token');
if(!token) window.location.replace('/login.html');

const u = JSON.parse(localStorage.getItem('ds_user')||'{}');
document.getElementById('uAvatar').textContent=(u.name||'A').charAt(0).toUpperCase();
document.getElementById('uName').textContent=u.name||'Admin';
document.getElementById('mName').textContent=u.name||'Admin';

function toggleMenu(){document.getElementById('uMenu').classList.toggle('show');}
document.addEventListener('click',function(e){const p=document.querySelector('.nav-user');const m=document.getElementById('uMenu');if(p&&!p.contains(e.target)&&m)m.classList.remove('show');});
function doLogout(){fetch('/api/logout',{method:'POST',headers:{'authorization':token}});localStorage.clear();window.location.replace('/login.html');}

let allUsers = [];

async function loadUsers(){
  const res = await fetch('/api/admin/users', { headers: { 'authorization': token } });
  if(res.status===401||res.status===403){ window.location.replace('/login.html'); return; }
  const data = await res.json();
  allUsers = data.users || data;
  renderUsers(allUsers);
  updateStats(allUsers);
}

function updateStats(users){
  document.getElementById('statTotal').textContent = users.length;
  document.getElementById('statActive').textContent = users.filter(u=>u.active).length;
  document.getElementById('statInactive').textContent = users.filter(u=>!u.active).length;
  document.getElementById('statDevices').textContent = users.filter(u=>u.deviceRegistered).length;
}

function filterUsers(q){
  const filtered = allUsers.filter(u=>
    u.name?.toLowerCase().includes(q.toLowerCase()) ||
    u.username?.toLowerCase().includes(q.toLowerCase()) ||
    u.designation?.toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(filtered);
}

function renderUsers(users){
  if(!users.length){
    document.getElementById('usersContainer').innerHTML='<div class="loading-wrap"><div style="font-size:2rem;opacity:0.3;">👤</div><div style="font-size:0.78rem;color:#64748B;">No users found</div></div>';
    return;
  }
  const rows = users.map((u,i)=>{
    const initial = (u.name||'U').charAt(0).toUpperCase();
    const deviceBadge = u.role==='admin'
      ? '<span style="font-size:0.7rem;color:#94A3B8;">N/A</span>'
      : u.deviceRegistered
        ? '<span class="badge badge-device">📱 Registered</span>'
        : u.deviceCode
          ? '<span class="badge badge-nodevice">⏳ Pending</span>'
          : '<span class="badge badge-nodevice">— No Device</span>';
    const deviceBtns = u.role!=='admin' ? `
      <button type="button" class="action-btn btn-device" onclick="generateDeviceCode('${u._id}')">📱 Code</button>
      <button type="button" class="action-btn btn-reset" onclick="resetDevice('${u._id}')">🔄 Reset</button>` : '';
    return `<tr>
      <td style="color:#94A3B8;font-family:'DM Mono',monospace;font-size:0.72rem;">${i+1}</td>
      <td><div class="user-cell"><div class="user-avatar-cell">${initial}</div><div class="user-cell-name">${u.name||'—'}</div></div></td>
      <td><code class="username-code">${u.username||'—'}</code></td>
      <td style="color:#64748B;font-size:0.8rem;">${u.designation||'—'}</td>
      <td><span class="badge badge-${u.role==='admin'?'admin':'user'}">${u.role==='admin'?'👑 Admin':'👤 User'}</span></td>
      <td><span class="badge badge-${u.active?'active':'inactive'}">${u.active?'● Active':'● Inactive'}</span></td>
      <td>${deviceBadge}</td>
      <td><div class="actions-cell">
        <button type="button" class="action-btn btn-edit" onclick="openEdit('${u._id}','${(u.name||'').replace(/'/g,"\\'")}','${u.username||''}','${(u.designation||'').replace(/'/g,"\\'")}','${u.role}')">✏️ Edit</button>
        ${deviceBtns}
        <button type="button" class="action-btn ${u.active?'btn-toggle-on':'btn-toggle-off'}" onclick="toggleUser('${u._id}',${u.active})">${u.active?'🚫 Disable':'✅ Enable'}</button>
        <button type="button" class="action-btn btn-delete" onclick="deleteUser('${u._id}','${(u.name||'').replace(/'/g,"\\'")}')">🗑️ Delete</button>
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('usersContainer').innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>User</th><th>Username</th><th>Designation</th>
      <th>Role</th><th>Status</th><th>Device</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function addUser(){
  const name=document.getElementById('newName').value.trim();
  const username=document.getElementById('newUsername').value.trim();
  const password=document.getElementById('newPassword').value.trim();
  const designation=document.getElementById('newDesignation').value.trim();
  const role=document.getElementById('newRole').value;
  if(!name||!username||!password){ alert('Name, username and password are required'); return; }
  const res=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json','authorization':token},body:JSON.stringify({name,username,password,designation,role,active:true})});
  const data=await res.json();
  if(res.ok){
    document.getElementById('newName').value='';
    document.getElementById('newUsername').value='';
    document.getElementById('newPassword').value='';
    document.getElementById('newDesignation').value='';
    loadUsers();
  } else { alert(data.error||'Failed to add user'); }
}

function openEdit(id,name,username,designation,role){
  document.getElementById('editId').value=id;
  document.getElementById('editName').value=name;
  document.getElementById('editUsername').value=username;
  document.getElementById('editDesignation').value=designation;
  document.getElementById('editRole').value=role;
  document.getElementById('editPassword').value='';
  document.getElementById('editModal').classList.add('show');
}
function closeModal(){ document.getElementById('editModal').classList.remove('show'); }

async function saveEdit(){
  const id=document.getElementById('editId').value;
  const body={
    name:document.getElementById('editName').value.trim(),
    username:document.getElementById('editUsername').value.trim(),
    designation:document.getElementById('editDesignation').value.trim(),
    role:document.getElementById('editRole').value
  };
  const pwd=document.getElementById('editPassword').value.trim();
  if(pwd) body.password=pwd;
  const res=await fetch(`/api/admin/users/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','authorization':token},body:JSON.stringify(body)});
  if(res.ok){ closeModal(); loadUsers(); }
  else{ const d=await res.json(); alert(d.error||'Failed to update'); }
}

async function toggleUser(id,currentActive){
  if(!confirm(`${currentActive?'Disable':'Enable'} this user?`)) return;
  const res=await fetch(`/api/admin/users/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','authorization':token},body:JSON.stringify({active:!currentActive})});
  if(res.ok) loadUsers();
}

async function deleteUser(id,name){
  if(!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
  const res=await fetch(`/api/admin/users/${id}`,{method:'DELETE',headers:{'authorization':token}});
  if(res.ok) loadUsers();
  else alert('Failed to delete user');
}

async function generateDeviceCode(userId){
  const res=await fetch(`/api/admin/users/${userId}/device-code`,{method:'POST',headers:{'authorization':token}});
  const data=await res.json();
  if(data.success){
    alert(`✅ Device Code Generated!\n\n${data.deviceCode}\n\nShare this code with the user.\nThey will enter it on first login to register their device.`);
    loadUsers();
  }
}

async function resetDevice(userId){
  if(!confirm('Reset this user\'s device?\n\nThey will be logged out immediately and will need a new device code to login.')) return;
  const res=await fetch(`/api/admin/users/${userId}/reset-device`,{method:'POST',headers:{'authorization':token}});
  const data=await res.json();
  if(data.success){
    alert(`🔄 Device Reset Successful!\n\nNew Device Code:\n${data.deviceCode}\n\nUser has been logged out. Share this new code with them.`);
    loadUsers();
  }
}

document.getElementById('editModal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
loadUsers();
</script>
</body>
</html>
